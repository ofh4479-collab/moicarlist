<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GirlCarList | Premium Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); position: sticky; top:0; z-index:100; border-bottom:1px solid #333; }
        .area-pill { background: #1a1a1b; border: 1px solid #333; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; white-space: nowrap; }
        .area-pill:hover { background: var(--gold); color: #000; }
        .card { background: #1a1a1b; border-radius: 20px; overflow: hidden; border: 1px solid #222; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .available { background: #30d158; color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 600; padding: 12px; border-radius: 12px; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

    <nav class="h-14 flex items-center justify-between px-6">
        <div class="text-[#d4af37] font-bold text-xl cursor-pointer" onclick="location.reload()">GirlCarList</div>
        <div class="text-sm text-gray-400">Premium Selection</div>
    </nav>

    <div id="home" class="page active">
        <div class="py-16 text-center">
            <h1 class="text-4xl font-extrabold mb-4">Welcome to <span class="text-[#d4af37]">GirlCarList</span></h1>
            <div class="flex flex-wrap justify-center gap-2 mt-8 px-4">
                <div class="area-pill" onclick="showArea('Alor Setar')">Alor Setar</div>
                <div class="area-pill" onclick="showArea('Sungei Petani')">Sungei Petani</div>
                <div class="area-pill" onclick="showArea('Penang')">Penang</div>
                <div class="area-pill" onclick="showArea('Bukit Mertajam')">Bukit Mertajam</div>
                <div class="area-pill" onclick="showArea('Ipoh')">Ipoh</div>
            </div>
        </div>
        <div class="max-w-6xl mx-auto px-6 pb-20">
            <h2 class="text-2xl font-bold mb-8">Available Today</h2>
            <div id="mainList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="p-6">
            <div class="mb-6 text-[#d4af37] cursor-pointer" onclick="showHome()">← Back</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <script>
        // ======= 在这里直接修改你的资料，顾客就能看到了 =======
        const girls = [
            {
                id: "1",
                name: "YUKI",
                age: "23",
                price: "400",
                area: "Alor Setar",
                status: "available",
                whatsapp: "60123456789",
                photos: ["https://via.placeholder.com/400x500"],
                description: "Sweet and caring girlfriend type. Top Service."
            },
            {
                id: "2",
                name: "MIKA",
                age: "22",
                price: "350",
                area: "Penang",
                status: "busy",
                whatsapp: "60123456789",
                photos: ["https://via.placeholder.com/400x500"],
                description: "Playful and friendly. Best experience."
            }
            // 以后要加人，直接按格式复制上面的代码块
        ];

        function showHome() {
            document.getElementById('detailPage').classList.remove('active');
            document.getElementById('home').classList.add('active');
        }

        function showArea(area) {
            const filtered = girls.filter(g => g.area === area);
            renderList(filtered, `Area: ${area}`);
        }

        function showProfile(id) {
            const g = girls.find(x => x.id === id);
            document.getElementById('home').classList.remove('active');
            document.getElementById('detailPage').classList.add('active');
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photos[0]}" class="w-full rounded-3xl mb-6">
                <h1 class="text-3xl font-bold">${g.name}, ${g.age}</h1>
                <div class="text-[#d4af37] text-2xl font-bold my-4">RM ${g.price}</div>
                <p class="text-gray-400 mb-8">${g.description}</p>
                <a href="https://wa.me/${g.whatsapp}?text=Hi ${g.name}, I saw you on GirlCarList" class="btn-gold">WhatsApp Booking</a>
            `;
        }

        function renderList(data, title = "Available Today") {
            const html = data.map(g => `
                <div class="card" onclick="showProfile('${g.id}')">
                    <img src="${g.photos[0]}" class="w-full h-72 object-cover">
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold">${g.name}</span>
                            <span class="status-badge ${g.status === 'available' ? 'available' : 'busy'}">${g.status}</span>
                        </div>
                        <div class="text-[#d4af37] font-bold">RM ${g.price}</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('mainList').innerHTML = html || '<p>No one here yet.</p>';
            window.scrollTo(0,0);
        }

        renderList(girls);
    </script>
</body>
</html>
