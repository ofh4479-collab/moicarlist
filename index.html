<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MD8RMMY2TZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MD8RMMY2TZ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoiCarList | Professional Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(20, 20, 20, 0.98); padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .nav-link { cursor: pointer; color: #aaa; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .nav-link:hover { color: var(--gold); }
        .lang-toggle { color: var(--gold); font-size: 12px; font-weight: bold; border: 1px solid #333; padding: 2px 8px; border-radius: 4px; background: #111; }
        
        .gold-text { color: var(--gold); font-weight: 600; }
        .area-button { background: #111; border: 1px solid var(--gold); cursor: pointer; font-size: 12px; padding: 8px 4px; border-radius: 8px; color: #fff; text-align: center; }
        .area-button.active { background: var(--gold); color: #000; font-weight: bold; }
        
        /* 后台专用小标签 */
        .admin-tab { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .admin-tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        .card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; }
        .card-img { width: 100%; height: 220px; object-fit: contain; background: #000; }
        
        .status-mini { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .available { background: var(--whatsapp); color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .stop { background: #555; color: #fff; }
        
        .nation-tag { font-size: 9px; background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .hot-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: var(--gold); font-size: 10px; padding: 3px 7px; border-radius: 20px; border: 1px solid var(--gold); font-weight: bold; z-index: 10; }
        
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        input, select, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; width: 100%; margin: 4px 0; outline: none; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .btn-preset { background: #222; font-size: 10px; padding: 5px 8px; border-radius: 4px; color: var(--gold); border: 1px solid #444; }
        .admin-item { background: #0a0a0a; border-bottom: 1px solid #222; padding: 12px 10px; display: flex; align-items: center; justify-content: space-between; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="gold-text text-xl cursor-pointer font-bold" onclick="navigateTo('home')">MoiCarList</div>
            <div class="flex gap-3 items-center">
                <div id="user-info" class="hidden flex items-center gap-2">
                    <span id="user-display" class="text-xs text-gold font-bold">User</span>
                    <a id="admin-link" onclick="navigateTo('adminPage')" class="nav-link hidden text-blue-400">ADMIN</a>
                    <a onclick="handleLogout()" class="nav-link text-[9px] text-red-500">OUT</a>
                </div>
                <div id="auth-buttons">
                    <a onclick="openAuthModal('login')" class="nav-link">Login</a>
                </div>
                <button id="btn-lang-toggle" onclick="toggleLang()" class="lang-toggle">EN</button>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div id="areaButtons" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-6"></div>
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-3">
                <h2 class="text-lg font-bold gold-text">✨ Available Today</h2>
                <div class="flex gap-2 w-full md:w-auto">
                    <select id="nationFilter" onchange="window.selectNation(this.value)" class="bg-[#111] text-gold border border-[#333] px-2 py-1 text-xs flex-1"></select>
                    <select id="cupFilter" onchange="window.selectCup(this.value)" class="bg-[#111] text-gold border border-[#333] px-2 py-1 text-xs flex-1"></select>
                </div>
            </div>
            <div id="displayList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-2xl mx-auto p-4 pb-20">
            <div class="mb-4 gold-text font-bold cursor-pointer" onclick="navigateTo('home')">← BACK</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="max-w-4xl mx-auto p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold gold-text">ADMIN PANEL</h2>
                <button onclick="openModal()" class="bg-gold text-black px-4 py-1 rounded-full text-sm font-bold">+ ADD</button>
            </div>
            
            <div id="adminAreaTabs" class="flex flex-wrap gap-2 mb-4 border-b border-[#222] pb-4"></div>

            <div id="adminList" class="space-y-1"></div>
        </div>
    </div>

    <div id="authModal" class="modal"><div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-[#222] text-center"><h3 id="authTitle" class="gold-text font-bold mb-6">LOGIN</h3><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><button onclick="processAuth()" id="authSubmitBtn" class="btn-gold">Proceed</button><p onclick="toggleAuthMode()" class="text-[10px] text-gray-500 mt-4 cursor-pointer underline">Switch Login / Register</p><button onclick="closeAuthModal()" class="mt-4 text-xs opacity-50">CANCEL</button></div></div>
    
    <div id="usernameModal" class="modal"><div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-gold text-center"><input type="text" id="newUsername" placeholder="Set Your Username"><button onclick="saveUsername()" class="btn-gold mt-4">Confirm</button></div></div>

    <div id="girlModal" class="modal">
        <div class="bg-[#111] p-6 rounded-xl w-full max-w-sm max-h-[90vh] overflow-y-auto border border-[#222]">
            <input type="hidden" id="editId">
            <input type="text" id="gName" placeholder="Name">
            <div class="grid grid-cols-2 gap-2"><input type="number" id="gAge" placeholder="Age"><input type="text" id="gNation" placeholder="Nation"></div>
            <div class="grid grid-cols-2 gap-2"><input type="text" id="gCup" placeholder="Cup"><input type="text" id="gHeight" placeholder="Height"></div>
            <select id="gArea"><option>Alor Setar</option><option>Sungei Petani</option><option>Bukit Mertajam</option><option>Penang</option><option>Ipoh</option></select>
            <div class="grid grid-cols-2 gap-2">
                <select id="gStatus"><option value="available">Available</option><option value="busy">Busy</option><option value="stop">Stop</option></select>
                <select id="gIsHidden"><option value="false">Show</option><option value="true">Hide</option></select>
            </div>
            <div class="flex gap-2 my-2"><button onclick="setPrice(250)" class="btn-preset">Set 250</button><button onclick="setPrice(270)" class="btn-preset">Set 270</button></div>
            <div class="grid grid-cols-2 gap-2"><input type="number" id="gPrice1" placeholder="1 Shot"><input type="number" id="gPrice2" placeholder="2 Shot"></div>
            <div class="grid grid-cols-2 gap-2"><input type="number" id="gPrice3" placeholder="3 Shot"><input type="number" id="gPriceOvn" placeholder="Overnight"></div>
            <div class="flex gap-2"><input type="text" id="gPhoto" placeholder="Photo URL" class="flex-1"><input type="file" id="fileInput" class="hidden" accept="image/*"><button onclick="document.getElementById('fileInput').click()" class="bg-gray-700 px-2 rounded text-[10px]">FILE</button></div>
            <input type="text" id="gWhatsapp" placeholder="WhatsApp (60xxx)" value="601117917032">
            <textarea id="gDesc" placeholder="Bio" rows="2"></textarea>
            <button onclick="handleSave()" class="btn-gold mt-4">Save Profile</button>
            <button onclick="closeModal()" class="w-full text-gray-600 mt-4 text-xs">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, getDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs", authDomain: "girlcarlist-db.firebaseapp.com", projectId: "girlcarlist-db", storageBucket: "girlcarlist-db.firebasestorage.app", appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "girls");

        let allData = [];
        let currentArea = 'Alor Setar';
        let adminArea = 'Alor Setar'; // 后台当前选中的地区
        let currentNation = 'All';
        let currentCup = 'All';
        let authMode = 'login';
        const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];

        onAuthStateChanged(auth, async (user) => {
            const adminLink = document.getElementById('admin-link');
            if(user) {
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('auth-buttons').classList.add('hidden');
                const uDoc = await getDoc(doc(db, "users", user.uid));
                if(uDoc.exists()) {
                    document.getElementById('user-display').innerText = uDoc.data().username;
                    if(uDoc.data().isAdmin === true) adminLink.classList.remove('hidden');
                } else { document.getElementById('usernameModal').classList.add('active'); }
            } else {
                document.getElementById('user-info').classList.add('hidden');
                adminLink.classList.add('hidden');
                document.getElementById('auth-buttons').classList.remove('hidden');
            }
        });

        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                      .sort((a, b) => (a.name || "").localeCompare(b.name || ""));
            window.renderEverything();
        });

        window.renderEverything = () => {
            // 渲染前台地区按钮
            document.getElementById('areaButtons').innerHTML = areas.map(a => `<div class="area-button ${currentArea === a ? 'active' : ''}" onclick="window.selectArea('${a}')">${a}</div>`).join('');
            
            // 渲染后台地区 Tabs
            document.getElementById('adminAreaTabs').innerHTML = areas.map(a => `<div class="admin-tab ${adminArea === a ? 'active' : ''}" onclick="window.selectAdminArea('${a}')">${a}</div>`).join('');

            // 前台过滤与渲染
            let filtered = allData.filter(g => g.area === currentArea && g.isHidden !== "true" && g.isHidden !== true);
            if(currentNation !== 'All') filtered = filtered.filter(g => g.nation === currentNation);
            if(currentCup !== 'All') filtered = filtered.filter(g => g.cup === currentCup);
            
            document.getElementById('displayList').innerHTML = filtered.map(g => `
                <div class="card" onclick="window.showDetail('${g.id}')">
                    <img src="${g.photo}" class="card-img">
                    <div class="p-3">
                        <div class="flex justify-between items-center mb-1"><span class="gold-text">${g.name}</span><span class="status-mini ${g.status}">${g.status}</span></div>
                        <div class="flex gap-2 items-center"><span class="nation-tag">${g.nation}</span><span class="text-[10px] opacity-60">${g.age}Y | ${g.cup} | ${g.height}</span></div>
                    </div>
                </div>`).join('');

            // 后台列表渲染（按 adminArea 过滤）
            const adminFiltered = allData.filter(g => g.area === adminArea);
            document.getElementById('adminList').innerHTML = adminFiltered.map(g => `
                <div class="admin-item">
                    <div class="flex flex-col">
                        <span class="text-xs font-bold ${g.isHidden==='true'?'text-gray-600':''}">${g.name}</span>
                        <span class="text-[9px] opacity-50">${g.nation} | ${g.status}</span>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="window.handleEdit('${g.id}')" class="text-blue-400 text-[10px] font-bold">EDIT</button>
                        <button onclick="window.handleDelete('${g.id}')" class="text-red-500 text-[10px] font-bold">DEL</button>
                    </div>
                </div>`).join('');

            // 更新过滤器选项
            const nations = ['All', ...new Set(allData.map(g => g.nation).filter(Boolean))];
            document.getElementById('nationFilter').innerHTML = nations.map(n => `<option value="${n}" ${currentNation===n?'selected':''}>${n==='All'?'All Nations':n}</option>`).join('');
            const cups = ['All', ...new Set(allData.map(g => g.cup).filter(Boolean))];
            document.getElementById('cupFilter').innerHTML = cups.map(c => `<option value="${c}" ${currentCup===c?'selected':''}>${c==='All'?'All Cups':c}</option>`).join('');
        };

        window.selectAdminArea = (a) => { adminArea = a; window.renderEverything(); };
        window.selectArea = (a) => { currentArea = a; window.renderEverything(); };
        window.selectNation = (n) => { currentNation = n; window.renderEverything(); };
        window.selectCup = (c) => { currentCup = c; window.renderEverything(); };

        window.showDetail = async (id) => {
            const g = allData.find(x => x.id === id);
            await updateDoc(doc(db, "girls", id), { clicks: increment(1) });
            navigateTo('detailPage');
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-xl mb-4"><h1 class="text-2xl font-bold gold-text">${g.name}</h1>
                <p class="mb-4 opacity-60 text-sm">${g.age}Y | ${g.cup} | ${g.nation}</p>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-[#111] p-3 rounded">1S: RM${g.p1}</div><div class="bg-[#111] p-3 rounded">OVN: RM${g.povn}</div>
                </div>
                <a href="https://wa.me/${g.whatsapp}" class="block w-full bg-[#25D366] text-center py-3 rounded-xl font-bold uppercase">WhatsApp Booking</a>
            `;
        };

        window.handleSave = async () => {
            const id = document.getElementById('editId').value;
            const data = { 
                name: document.getElementById('gName').value, age: document.getElementById('gAge').value, nation: document.getElementById('gNation').value, cup: document.getElementById('gCup').value, height: document.getElementById('gHeight').value, 
                p1: document.getElementById('gPrice1').value, p2: document.getElementById('gPrice2').value, p3: document.getElementById('gPrice3').value, povn: document.getElementById('gPriceOvn').value, 
                area: document.getElementById('gArea').value, status: document.getElementById('gStatus').value, photo: document.getElementById('gPhoto').value, whatsapp: document.getElementById('gWhatsapp').value, desc: document.getElementById('gDesc').value, isHidden: document.getElementById('gIsHidden').value
            };
            if(id) await updateDoc(doc(db, "girls", id), data); else await addDoc(colRef, data);
            closeModal();
        };

        window.handleEdit = (id) => {
            const g = allData.find(x => x.id === id); openModal();
            document.getElementById('editId').value = g.id; document.getElementById('gName').value = g.name; document.getElementById('gAge').value = g.age;
            document.getElementById('gNation').value = g.nation; document.getElementById('gCup').value = g.cup; document.getElementById('gHeight').value = g.height;
            document.getElementById('gPrice1').value = g.p1; document.getElementById('gPrice2').value = g.p2; document.getElementById('gPrice3').value = g.p3; document.getElementById('gPriceOvn').value = g.povn;
            document.getElementById('gArea').value = g.area; document.getElementById('gStatus').value = g.status; document.getElementById('gPhoto').value = g.photo;
            document.getElementById('gWhatsapp').value = g.whatsapp; document.getElementById('gDesc').value = g.desc; document.getElementById('gIsHidden').value = g.isHidden || "false";
        };

        window.processAuth = async () => {
            const e = document.getElementById('authEmail').value; const p = document.getElementById('authPassword').value;
            try { if(authMode === 'register') await createUserWithEmailAndPassword(auth, e, p); else await signInWithEmailAndPassword(auth, e, p); closeAuthModal(); } catch(err) { alert(err.message); }
        };
        window.saveUsername = async () => { const n = document.getElementById('newUsername').value; await setDoc(doc(db, "users", auth.currentUser.uid), {username: n, isAdmin: false}, {merge:true}); location.reload(); };
        window.handleDelete = async (id) => { if(confirm('Delete?')) await deleteDoc(doc(db, "girls", id)); };
        window.handleLogout = () => signOut(auth);
        window.setPrice = (b) => { document.getElementById('gPrice1').value = b; document.getElementById('gPriceOvn').value = b === 250 ? 800 : 900; };
        window.openAuthModal = (m) => { authMode = m; document.getElementById('authTitle').innerText = m.toUpperCase(); document.getElementById('authModal').classList.add('active'); };
        window.closeAuthModal = () => document.getElementById('authModal').classList.remove('active');
        window.toggleAuthMode = () => openAuthModal(authMode==='login'?'register':'login');
        window.navigateTo = (id) => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); };
        window.openModal = () => document.getElementById('girlModal').classList.add('active');
        window.closeModal = () => { document.getElementById('girlModal').classList.remove('active'); document.getElementById('editId').value = ""; };
    </script>
</body>
</html>
