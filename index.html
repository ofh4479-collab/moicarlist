<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MD8RMMY2TZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MD8RMMY2TZ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoiCarList | Professional Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(20, 20, 20, 0.98); padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .nav-link { cursor: pointer; color: #aaa; font-size: 11px; font-weight: 600; text-transform: uppercase; transition: color 0.3s; }
        .nav-link:hover { color: var(--gold); }
        .lang-toggle { color: var(--gold); font-size: 12px; font-weight: bold; border: 1px solid #333; padding: 2px 8px; border-radius: 4px; background: #111; }
        .hero-section { background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); padding: 35px 20px; text-align: center; border-bottom: 1px solid #222; }
        .area-button { background: #111; border: 1px solid var(--gold); transition: 0.2s; cursor: pointer; font-size: 12px; padding: 8px 4px; border-radius: 8px; color: #fff; }
        .area-button.active { background: var(--gold); color: #000; font-weight: bold; }
        .card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card-img { width: 100%; height: 220px; object-fit: contain; background: #000; border-bottom: 1px solid #111; }
        .gold-text { color: var(--gold); font-weight: 600; }
        .status-mini { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .available { background: var(--whatsapp); color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .stop { background: #555; color: #fff; }
        .search-container { background: #111; border: 1px solid #222; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; margin-bottom: 15px; }
        .search-input { background: transparent; border: none; margin: 0; padding: 5px; font-size: 13px; width: 100%; color: white; outline: none; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin: 8px 0; outline: none; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; text-transform: uppercase; }
        #user-display { font-size: 11px; color: var(--gold); font-weight: bold; border-right: 1px solid #333; padding-right: 10px; }
        .divider { position: relative; margin: 20px 0; text-align: center; border-top: 1px solid #222; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #111; padding: 0 10px; color: #555; font-size: 10px; }
    </style>
</head>
<body>

    <script>
        const translations = {
            en: { welcome: "Welcome to MoiCarList", available: "✨ Available Today", search: "Search name...", booking: "WHATSAPP BOOKING", ovn: "Overnight", back: "← BACK" },
            cn: { welcome: "欢迎来到 MoiCarList", available: "✨ 今日在线", search: "搜索名字...", booking: "WHATSAPP 预约", ovn: "包夜", back: "← 返回" },
            bm: { welcome: "Selamat Datang", available: "✨ Tersedia Hari Ini", search: "Cari nama...", booking: "TEMPAHAN WHATSAPP", ovn: "Bermalam", back: "← KEMBALI" }
        };
        let currentLang = 'en';
        function toggleLang() {
            currentLang = currentLang === 'en' ? 'cn' : (currentLang === 'cn' ? 'bm' : 'en');
            document.getElementById('btn-lang-toggle').innerText = currentLang.toUpperCase();
            updateTexts();
        }
        function updateTexts() {
            const t = translations[currentLang];
            document.getElementById('hero-title').innerText = t.welcome;
            document.getElementById('section-title').innerText = t.available;
            document.getElementById('frontSearch').placeholder = t.search;
            if(window.renderEverything) window.renderEverything();
        }
    </script>

    <nav>
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="gold-text text-xl font-bold cursor-pointer" onclick="navigateTo('home')">MoiCarList</div>
            <div class="flex gap-3 items-center">
                <div id="user-info" class="hidden flex items-center gap-2">
                    <span id="user-display">老板</span>
                    <a onclick="handleLogout()" class="nav-link" style="font-size: 9px; color: #ff453a;">Logout</a>
                </div>
                <div id="auth-buttons">
                    <a onclick="openAuthModal('login')" class="nav-link">Login</a>
                </div>
                <button id="btn-lang-toggle" onclick="toggleLang()" class="lang-toggle">EN</button>
                <a onclick="showAdmin()" class="nav-link">Admin</a>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="hero-section">
            <h1 id="hero-title" class="text-2xl md:text-4xl font-bold text-[#d4af37] mb-2">MoiCarList</h1>
            <p class="text-gray-400 text-xs">Premium Service Directory</p>
        </div>
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div id="areaButtons" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-6"></div>
            <div class="search-container">
                <input type="text" id="frontSearch" class="search-input" placeholder="Search name..." oninput="window.renderEverything()">
            </div>
            <h2 id="section-title" class="text-lg font-bold gold-text mb-4">✨ Available Today</h2>
            <div id="displayList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-2xl mx-auto p-4 pb-20">
            <div id="back-text" class="mb-4 gold-text font-bold cursor-pointer" onclick="navigateTo('home')">← BACK</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-[#222]">
            <h3 id="authTitle" class="gold-text font-bold mb-6 text-center text-xl">WELCOME</h3>
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-lg flex items-center justify-center gap-3 text-sm mb-2">
                <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Continue with Google
            </button>
            <div class="divider"><span>Or Email</span></div>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password">
            <button onclick="processAuth()" class="btn-gold mt-4">Submit</button>
            <p id="authSwitch" onclick="toggleAuthMode()" class="text-center text-[10px] text-gray-500 mt-6 cursor-pointer underline">No account? Register</p>
            <button onclick="closeModal('authModal')" class="w-full text-gray-600 mt-4 text-xs">CLOSE</button>
        </div>
    </div>

    <div id="usernameModal" class="modal">
        <div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-gold text-center">
            <h3 class="gold-text font-bold mb-2">Pick A Unique Name</h3>
            <p class="text-[10px] text-gray-500 mb-6">Everyone will see this name in comments.</p>
            <input type="text" id="newUsername" placeholder="e.g. Boss99 / 小王">
            <p id="usernameError" class="text-red-500 text-[10px] mt-1 hidden"></p>
            <button onclick="saveUsername()" class="btn-gold mt-6">Confirm</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs", authDomain: "girlcarlist-db.firebaseapp.com", 
            projectId: "girlcarlist-db", storageBucket: "girlcarlist-db.firebasestorage.app", 
            messagingSenderId: "418933639880", appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let authMode = 'login';
        let allData = [];
        let currentArea = 'Alor Setar';

        // --- AUTH ---
        window.openAuthModal = (mode) => { authMode = mode; document.getElementById('authModal').classList.add('active'); };
        window.toggleAuthMode = () => { authMode = authMode === 'login' ? 'register' : 'login'; document.getElementById('authTitle').innerText = authMode.toUpperCase(); };
        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, new GoogleAuthProvider()); closeModal('authModal'); } catch(e){alert(e.message)} };
        window.processAuth = async () => {
            const e = document.getElementById('authEmail').value; const p = document.getElementById('authPassword').value;
            try { if(authMode==='register') await createUserWithEmailAndPassword(auth,e,p); else await signInWithEmailAndPassword(auth,e,p); closeModal('authModal'); } catch(err){alert(err.message)}
        };
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if(user) {
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(userDoc.exists() && userDoc.data().username) {
                    document.getElementById('user-display').innerText = userDoc.data().username;
                } else { document.getElementById('usernameModal').classList.add('active'); }
            } else {
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
            }
        });

        window.saveUsername = async () => {
            const name = document.getElementById('newUsername').value.trim();
            const err = document.getElementById('usernameError');
            const check = await getDoc(doc(db, "usernames", name.toLowerCase()));
            if(check.exists()){ err.innerText="Name Taken!"; err.classList.remove('hidden'); return; }
            await setDoc(doc(db, "usernames", name.toLowerCase()), {uid: currentUser.uid});
            await setDoc(doc(db, "users", currentUser.uid), {username: name, points:0}, {merge:true});
            document.getElementById('user-display').innerText = name;
            document.getElementById('usernameModal').classList.remove('active');
        };

        // --- DATA ---
        onSnapshot(collection(db, "girls"), (snap) => {
            allData = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));
            window.renderEverything();
        });

        window.renderEverything = () => {
            const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];
            document.getElementById('areaButtons').innerHTML = areas.map(a => `<button class="area-button ${currentArea===a?'active':''}" onclick="window.selectArea('${a}')">${a}</button>`).join('');
            
            let list = allData.filter(g => g.area === currentArea && !g.isHidden);
            const s = document.getElementById('frontSearch').value.toLowerCase();
            if(s) list = list.filter(g => g.name.toLowerCase().includes(s));

            document.getElementById('displayList').innerHTML = list.map(g => `
                <div class="card" onclick="window.showDetail('${g.id}')">
                    <img src="${g.photo}" class="card-img">
                    <div class="p-2">
                        <div class="flex justify-between items-center mb-1"><span class="font-bold text-sm">${g.name}</span><span class="status-mini ${g.status}">${g.status}</span></div>
                        <div class="text-[10px] gold-text">${g.age}Y | ${g.cup} | ${g.nation}</div>
                    </div>
                </div>`).join('');
        };

        window.selectArea = (a) => { currentArea = a; window.renderEverything(); };

        window.showDetail = (id) => {
            const g = allData.find(x => x.id === id);
            const t = translations[currentLang];
            navigateTo('detailPage');
            document.getElementById('back-text').innerText = t.back;
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-xl mb-4 shadow-lg">
                <h1 class="text-2xl font-bold">${g.name} <span class="text-xs gold-text ml-2">${g.nation}</span></h1>
                <p class="gold-text text-sm mb-6">${g.age}Y | ${g.cup} | ${g.height}</p>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <div class="bg-[#111] p-3 rounded flex justify-between text-xs"><span>1Shot</span><span class="gold-text">RM${g.p1}</span></div>
                    <div class="bg-[#111] p-3 rounded flex justify-between text-xs"><span>2Shot</span><span class="gold-text">RM${g.p2}</span></div>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-6">
                    <div class="bg-[#111] p-3 rounded flex justify-between text-xs"><span>3Shot</span><span class="gold-text">RM${g.p3}</span></div>
                    <div class="bg-[#1a1100] border border-gold/30 p-3 rounded flex justify-between text-xs font-bold"><span>${t.ovn}</span><span class="gold-text">RM${g.povn||'??'}</span></div>
                </div>
                <div class="bg-[#111] p-4 rounded-lg text-gray-400 text-xs border-l-2 border-gold italic mb-6">"${g.desc}"</div>
                <a href="https://wa.me/${g.whatsapp}" target="_blank" class="block w-full bg-[#25D366] text-white font-bold py-4 rounded-xl text-center shadow-lg">${t.booking}</a>
            `;
        };
    </script>

    <script>
        function navigateTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showAdmin() { if(prompt("Pass") === "KAR#1999") alert("Admin login success!"); }
    </script>
</body>
</html>
