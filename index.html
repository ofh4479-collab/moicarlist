<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoiCarList | Professional Services</title>
    <meta property="og:title" content="MoiCarList | 专业服务预约">
    <meta property="og:image" content="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(20, 20, 20, 0.98); padding: 10px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .nav-link { cursor: pointer; color: #aaa; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .lang-toggle { color: var(--gold); font-size: 14px; font-weight: bold; border: 1px solid #333; padding: 2px 10px; border-radius: 4px; }
        
        /* 手机版地区按钮缩小 */
        .area-button { background: #111; border: 1px solid var(--gold); transition: 0.2s; cursor: pointer; font-size: 12px; padding: 8px 4px; border-radius: 8px; }
        .area-button.active { background: var(--gold); color: #000; }

        /* 小姐框框优化 */
        .card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; }
        /* 确保图片完整显示 */
        .card-img { width: 100%; height: 220px; object-fit: contain; background: #000; border-bottom: 1px solid #111; }
        
        .gold-text { color: var(--gold); font-weight: 600; }
        
        /* 状态标签缩小 */
        .status-mini { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .available { background: var(--whatsapp); color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .nation-tag { font-size: 9px; background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3); }

        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        
        input, select, textarea { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; width: 100%; margin: 4px 0; font-size: 14px; }
        .btn-preset { background: #333; font-size: 10px; padding: 4px 8px; border-radius: 4px; color: var(--gold); border: 1px solid #444; }
        
        /* 后台管理列表简化 */
        .admin-item { background: #0a0a0a; border-bottom: 1px solid #222; padding: 8px; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

    <script>
        const i18n = { en: "EN", cn: "中", bm: "BM" };
        let currentLang = 'en';
        function toggleLang() {
            const keys = Object.keys(i18n);
            let idx = keys.indexOf(currentLang);
            currentLang = keys[(idx + 1) % keys.length];
            document.getElementById('btn-lang-toggle').innerText = i18n[currentLang];
            location.reload(); // 简单处理
        }
    </script>

    <nav>
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="gold-text text-xl cursor-pointer" onclick="navigateTo('home')">MoiCarList</div>
            <div class="flex gap-3 items-center">
                <button id="btn-lang-toggle" onclick="toggleLang()" class="lang-toggle">EN</button>
                <a onclick="showAdmin()" class="nav-link">ADMIN</a>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div id="areaButtons" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-8 text-center"></div>
            
            <div class="flex justify-between items-end mb-6">
                <h2 class="text-lg font-bold gold-text">✨ Available Today</h2>
                <div id="nationFilterContainer" class="flex gap-1"></div>
            </div>

            <div id="displayList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-2xl mx-auto p-4 pb-20">
            <div class="mb-4 gold-text font-bold cursor-pointer" onclick="navigateTo('home')">← BACK</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="adminPage" class="page bg-[#050505]">
        <div class="max-w-4xl mx-auto p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold gold-text">Admin Panel</h2>
                <button onclick="openModal()" class="bg-[#d4af37] text-black px-4 py-1 rounded-full font-bold text-sm">+ Add</button>
            </div>
            <div id="adminList" class="space-y-1"></div>
        </div>
    </div>

    <div id="girlModal" class="modal">
        <div class="bg-[#111] p-6 rounded-xl w-full max-w-sm max-h-[90vh] overflow-y-auto border border-[#222]">
            <h3 id="modalTitle" class="gold-text font-bold mb-4">Add Profile</h3>
            <input type="hidden" id="editId">
            <input type="text" id="gName" placeholder="Name">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="gAge" placeholder="Age">
                <select id="gNation">
                    <option value="Thailand">Thailand</option>
                    <option value="Vietnam">Vietnam</option>
                    <option value="Malaysia">Malaysia</option>
                    <option value="Indonesia">Indonesia</option>
                    <option value="Laos">Laos</option>
                    <option value="China">China</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-2"><input type="text" id="gCup" placeholder="Cup"><input type="text" id="gHeight" placeholder="Height"></div>
            <select id="gArea"><option>Alor Setar</option><option>Sungei Petani</option><option>Bukit Mertajam</option><option>Penang</option><option>Ipoh</option></select>
            <select id="gStatus"><option value="available">Available</option><option value="busy">Busy</option></select>
            
            <div class="flex gap-2 my-1">
                <button onclick="setPrice(250)" class="btn-preset">Set 250/500/750</button>
                <button onclick="setPrice(270)" class="btn-preset">Set 270/540/810</button>
            </div>
            <div class="grid grid-cols-3 gap-1">
                <input type="number" id="gPrice1" placeholder="1s">
                <input type="number" id="gPrice2" placeholder="2s">
                <input type="number" id="gPrice3" placeholder="3h">
            </div>

            <div class="mt-2 border border-[#333] p-2 rounded">
                <div class="flex gap-2">
                    <input type="text" id="gPhoto" placeholder="Photo URL" style="margin:0">
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-gray-700 px-2 rounded text-[10px] font-bold">UPLOAD</button>
                </div>
                <div id="uploadStatus" class="text-[10px] text-gray-500 mt-1">Ready</div>
            </div>

            <input type="text" id="gWhatsapp" placeholder="WhatsApp" value="601117917032">
            <textarea id="gDesc" placeholder="Bio" rows="2"></textarea>
            
            <button onclick="handleSave()" id="btnSave" class="w-full bg-[#d4af37] text-black font-bold py-2 rounded-lg mt-4 text-sm">SAVE DATA</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-2 text-xs">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs",
            authDomain: "girlcarlist-db.firebaseapp.com",
            projectId: "girlcarlist-db",
            storageBucket: "girlcarlist-db.firebasestorage.app",
            messagingSenderId: "418933639880",
            appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "girls");
        let allData = [];
        let currentArea = 'Alor Setar';
        let currentNation = 'All';

        // 价格快捷设置
        window.setPrice = (base) => {
            document.getElementById('gPrice1').value = base;
            document.getElementById('gPrice2').value = base * 2;
            document.getElementById('gPrice3').value = base * 3;
        };

        // 图片上传逻辑
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('uploadStatus');
            status.innerText = "Uploading...";
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch('https://api.imgbb.com/1/upload?key=6387d8537678e7f10b2df27f87a38753', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('gPhoto').value = result.data.url;
                    status.innerText = "Success ✅";
                }
            } catch (err) { status.innerText = "Error!"; }
        });

        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderEverything();
        });

        function renderEverything() {
            renderAreaButtons();
            const filtered = allData.filter(g => g.area === currentArea);
            
            // 提取当前区域有的国籍
            const nations = ['All', ...new Set(filtered.map(g => g.nation))];
            renderNationFilter(nations);

            const finalData = currentNation === 'All' ? filtered : filtered.filter(g => g.nation === currentNation);
            renderMain(finalData);
            renderAdmin(allData);
        }

        window.renderAreaButtons = () => {
            const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];
            document.getElementById('areaButtons').innerHTML = areas.map(a => `
                <div class="area-button ${currentArea === a ? 'active' : ''}" onclick="selectArea('${a}')">${a}</div>
            `).join('');
        };

        window.selectArea = (a) => { currentArea = a; currentNation = 'All'; renderEverything(); };

        function renderNationFilter(nations) {
            document.getElementById('nationFilterContainer').innerHTML = nations.map(n => `
                <button onclick="selectNation('${n}')" class="text-[10px] px-2 py-1 rounded border ${currentNation === n ? 'border-[#d4af37] text-[#d4af37]' : 'border-[#333] text-gray-500'}">
                    ${n}
                </button>
            `).join('');
        }
        window.selectNation = (n) => { currentNation = n; renderEverything(); };

        window.renderMain = (data) => {
            document.getElementById('displayList').innerHTML = data.map(g => `
                <div class="card shadow-lg" onclick="showDetail('${g.id}')">
                    <img src="${g.photo}" class="card-img">
                    <div class="p-2">
                        <div class="flex justify-between items-center mb-1">
                             <span class="gold-text text-sm truncate">${g.name}</span>
                             <span class="status-mini ${g.status}">${g.status}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="gold-text text-[10px] opacity-80">${g.age}Y | ${g.cup} | ${g.height}</span>
                            <span class="nation-tag">${g.nation}</span>
                        </div>
                    </div>
                </div>`).join('');
        };

        window.showDetail = (id) => {
            const g = allData.find(x => x.id === id);
            navigateTo('detailPage');
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-xl mb-4 shadow-xl">
                <div class="text-left px-2">
                    <div class="flex items-center gap-2 mb-1">
                        <h1 class="text-2xl font-bold">${g.name}</h1>
                        <span class="nation-tag">${g.nation}</span>
                    </div>
                    <p class="gold-text text-sm mb-6">${g.age}Y | ${g.cup} | ${g.height}</p>
                    <div class="grid gap-2 mb-6">
                        <div class="bg-[#111] p-3 rounded-lg flex justify-between"><span>1shot (45min)</span><span class="gold-text">RM ${g.p1}</span></div>
                        <div class="bg-[#111] p-3 rounded-lg flex justify-between"><span>2shot (90min)</span><span class="gold-text">RM ${g.p2}</span></div>
                        <div class="bg-[#111] p-3 rounded-lg flex justify-between"><span>3Shot (3 Hours)</span><span class="gold-text">RM ${g.p3}</span></div>
                    </div>
                    <div class="bg-[#111] p-4 rounded-lg text-gray-400 text-xs leading-relaxed border-l-2 border-[#d4af37]">${g.desc}</div>
                    <a href="https://wa.me/${g.whatsapp}" target="_blank" class="block w-full bg-[#25D366] text-white font-bold py-3 rounded-xl mt-6 text-center shadow-lg">WHATSAPP BOOKING</a>
                </div>`;
        };

        window.handleSave = async () => {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('gName').value, age: document.getElementById('gAge').value,
                nation: document.getElementById('gNation').value, cup: document.getElementById('gCup').value,
                height: document.getElementById('gHeight').value, p1: document.getElementById('gPrice1').value,
                p2: document.getElementById('gPrice2').value, p3: document.getElementById('gPrice3').value,
                area: document.getElementById('gArea').value, status: document.getElementById('gStatus').value,
                photo: document.getElementById('gPhoto').value, whatsapp: document.getElementById('gWhatsapp').value,
                desc: document.getElementById('gDesc').value
            };
            if(id) {
                await updateDoc(doc(db, "girls", id), data);
            } else {
                await addDoc(colRef, data);
            }
            closeModal();
        };

        window.handleEdit = (id) => {
            const g = allData.find(x => x.id === id);
            openModal(true);
            document.getElementById('editId').value = g.id;
            document.getElementById('gName').value = g.name;
            document.getElementById('gAge').value = g.age;
            document.getElementById('gNation').value = g.nation;
            document.getElementById('gCup').value = g.cup;
            document.getElementById('gHeight').value = g.height;
            document.getElementById('gPrice1').value = g.p1;
            document.getElementById('gPrice2').value = g.p2;
            document.getElementById('gPrice3').value = g.p3;
            document.getElementById('gArea').value = g.area;
            document.getElementById('gStatus').value = g.status;
            document.getElementById('gPhoto').value = g.photo;
            document.getElementById('gWhatsapp').value = g.whatsapp;
            document.getElementById('gDesc').value = g.desc;
            document.getElementById('modalTitle').innerText = "Edit Profile";
            document.getElementById('btnSave').innerText = "UPDATE DATA";
        };

        window.handleDelete = async id => { if(confirm('Delete?')) await deleteDoc(doc(db, "girls", id)); };

        window.renderAdmin = (data) => {
            const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];
            let html = "";
            areas.forEach(area => {
                const list = data.filter(g => g.area === area);
                html += `<div class="bg-[#111] px-3 py-1 text-[10px] gold-text mt-4 uppercase font-bold">${area} (${list.length})</div>`;
                list.forEach(g => {
                    html += `
                    <div class="admin-item">
                        <div class="flex items-center gap-3">
                            <img src="${g.photo}" class="w-8 h-8 rounded-full object-cover">
                            <div class="text-xs">
                                <div class="font-bold">${g.name} <span class="nation-tag" style="zoom:0.8">${g.nation}</span></div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="handleEdit('${g.id}')" class="text-blue-400 text-[10px] font-bold px-2 py-1 bg-blue-900/20 rounded">Edit</button>
                            <button onclick="handleDelete('${g.id}')" class="text-red-500 text-[10px] font-bold px-2 py-1 bg-red-900/20 rounded">Del</button>
                        </div>
                    </div>`;
                });
            });
            document.getElementById('adminList').innerHTML = html;
        };
    </script>

    <script>
        function navigateTo(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function showAdmin() { if(prompt("Pass") === "KAR#1999") navigateTo('adminPage'); }
        function openModal(isEdit = false) { 
            if(!isEdit) {
                document.getElementById('modalTitle').innerText = "Add Profile";
                document.getElementById('btnSave').innerText = "SAVE DATA";
                document.getElementById('editId').value = "";
                document.getElementById('gPhoto').value = "";
            }
            document.getElementById('girlModal').classList.add('active'); 
        }
        function closeModal() { document.getElementById('girlModal').classList.remove('active'); }
    </script>
</body>
</html>
