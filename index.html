<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GirlCarList | Professional Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100; border-bottom:1px solid #333; }
        .card { background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .available { background: var(--whatsapp); color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 700; padding: 12px; border-radius: 12px; cursor: pointer; border:none; width:100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input, select, textarea { background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin: 5px 0; font-size: 14px; }
        label { font-size: 12px; color: #888; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <nav class="h-14 flex items-center justify-between px-6">
        <div class="text-[#d4af37] font-bold text-xl cursor-pointer" onclick="navigateTo('home')">GirlCarList</div>
        <div class="flex gap-4 text-sm text-gray-400">
            <span onclick="navigateTo('home')" class="cursor-pointer">Home</span>
            <span onclick="showAdmin()" class="cursor-pointer">Admin</span>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <div id="displayList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-2xl mx-auto p-6 pb-24">
            <div class="mb-6 text-[#d4af37] font-bold cursor-pointer" onclick="navigateTo('home')">← Back</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="max-w-4xl mx-auto p-6">
            <div class="flex justify-between mb-8">
                <h2 class="text-2xl font-bold">Admin Panel</h2>
                <button onclick="openModal()" class="bg-[#d4af37] text-black px-4 py-1 rounded-full font-bold">+ Add Girl</button>
            </div>
            <div id="adminList" class="space-y-4"></div>
        </div>
    </div>

    <div id="girlModal" class="modal">
        <div class="bg-[#1c1c1e] p-6 rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <h3 class="text-[#d4af37] font-bold mb-2">Edit Girl Profile</h3>
            <input type="text" id="gName" placeholder="Name (e.g. Cindy)">
            <input type="number" id="gAge" placeholder="Age">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="gCup" placeholder="Cup (e.g. 38C)">
                <input type="text" id="gHeight" placeholder="Height (e.g. 158cm)">
            </div>
            <select id="gArea">
                <option>Alor Setar</option><option>Sungei Petani</option><option>Penang</option><option>Ipoh</option>
            </select>
            <select id="gStatus">
                <option value="available">Available</option><option value="busy">Busy</option>
            </select>
            
            <label>Pricing Settings (RM)</label>
            <input type="number" id="gPrice1" placeholder="1shot Price (45mins)">
            <input type="number" id="gPrice2" placeholder="2shot Price (90mins)">
            <input type="number" id="gPrice3" placeholder="3Hours Price">

            <input type="text" id="gPhoto" placeholder="Photo URL (Direct Link)">
            <input type="text" id="gWhatsapp" placeholder="WhatsApp Number (e.g. 60123456789)">
            <textarea id="gDesc" placeholder="Bio/Description"></textarea>
            
            <button onclick="handleSave()" class="btn-gold mt-6">Save to Cloud</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-4 text-xs">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs",
            authDomain: "girlcarlist-db.firebaseapp.com",
            projectId: "girlcarlist-db",
            storageBucket: "girlcarlist-db.firebasestorage.app",
            messagingSenderId: "418933639880",
            appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "girls");
        let allData = [];

        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderMain(allData);
            renderAdmin(allData);
        });

        window.handleSave = async function() {
            const data = {
                name: document.getElementById('gName').value,
                age: document.getElementById('gAge').value,
                cup: document.getElementById('gCup').value,
                height: document.getElementById('gHeight').value,
                p1: document.getElementById('gPrice1').value,
                p2: document.getElementById('gPrice2').value,
                p3: document.getElementById('gPrice3').value,
                area: document.getElementById('gArea').value,
                status: document.getElementById('gStatus').value,
                photo: document.getElementById('gPhoto').value,
                whatsapp: document.getElementById('gWhatsapp').value,
                desc: document.getElementById('gDesc').value
            };
            await addDoc(colRef, data);
            closeModal();
        };

        window.handleDelete = async id => { if(confirm('Delete?')) await deleteDoc(doc(db, "girls", id)); };

        window.renderMain = function(data) {
            document.getElementById('displayList').innerHTML = data.map(g => `
                <div class="card" onclick="showDetail('${g.id}')">
                    <img src="${g.photo}" class="w-full h-80 object-cover">
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-lg">${g.name} | ${g.age}Y</span>
                            <span class="status-badge ${g.status}">${g.status}</span>
                        </div>
                        <div class="text-gray-400 text-sm mb-2">${g.cup || '-'} | ${g.height || '-'}</div>
                        <div class="text-[#d4af37] font-bold text-lg">RM ${g.p1 || '0'}</div>
                    </div>
                </div>
            `).join('');
        };

        window.showDetail = function(id) {
            const g = allData.find(x => x.id === id);
            navigateTo('detailPage');
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-2xl mb-6 shadow-2xl">
                <h1 class="text-3xl font-bold">${g.name} | ${g.age}Y</h1>
                <p class="text-gray-400 text-lg mt-1">${g.cup} | ${g.height}</p>
                
                <div class="space-y-3 my-6">
                    <div class="bg-[#111] p-4 rounded-xl border border-[#333] flex justify-between items-center">
                        <span>1shot (45mint)</span><span class="text-[#d4af37] font-bold">RM ${g.p1}</span>
                    </div>
                    <div class="bg-[#111] p-4 rounded-xl border border-[#333] flex justify-between items-center">
                        <span>2shot (90mint)</span><span class="text-[#d4af37] font-bold">RM ${g.p2}</span>
                    </div>
                    <div class="bg-[#111] p-4 rounded-xl border border-[#333] flex justify-between items-center">
                        <span>3Hours</span><span class="text-[#d4af37] font-bold">RM ${g.p3}</span>
                    </div>
                </div>

                <div class="bg-[#0a0a0a] p-4 rounded-xl mb-8 border-l-4 border-[#d4af37]">
                    <p class="text-gray-300 text-sm leading-relaxed">${g.desc}</p>
                </div>

                <a href="https://wa.me/${g.whatsapp}" class="btn-gold" style="background: #25D366; color: white;">
                    <svg style="width:24px;height:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.816 9.816 0 0 0 12.04 2m.01 1.67c2.2 0 4.26.86 5.82 2.42 1.55 1.56 2.41 3.63 2.41 5.82 0 4.54-3.7 8.24-8.24 8.24-1.54 0-3.05-.43-4.36-1.24l-.31-.19-3.24.85.86-3.15-.21-.34A8.192 8.192 0 0 1 3.71 11.9c0-4.53 3.7-8.23 8.24-8.23m-3.53 4.75c-.19 0-.52.07-.79.37-.27.3-.85.83-.85 2.02 0 1.19.87 2.33.99 2.5.12.16 1.71 2.61 4.14 3.66.58.25 1.03.4 1.38.51.58.18 1.11.16 1.53.1.47-.07 1.44-.59 1.64-1.15.2-.56.2-1.04.14-1.15-.06-.11-.22-.17-.47-.29s-1.44-.71-1.66-.8-.47-.13-.67.13c-.2.27-.76.95-.93 1.15-.17.19-.34.22-.6.1s-1.07-.4-2.04-1.27c-.75-.67-1.26-1.5-1.4-1.75-.15-.26-.02-.4.11-.53.11-.11.26-.3.39-.45.13-.15.17-.26.26-.43.09-.17.04-.32-.02-.45-.07-.13-.67-1.62-.91-2.22-.24-.59-.49-.51-.67-.52l-.57-.01Z"/></svg>
                    WhatsApp Booking
                </a>
            `;
        };

        window.renderAdmin = function(data) {
            document.getElementById('adminList').innerHTML = data.map(g => `
                <div class="flex items-center justify-between bg-[#111] p-4 rounded-xl border border-[#222]">
                    <div class="flex items-center gap-4">
                        <img src="${g.photo}" class="w-12 h-12 rounded-full object-cover">
                        <div><div class="font-bold">${g.name}</div><div class="text-xs text-gray-500">${g.cup} | ${g.height}</div></div>
                    </div>
                    <button onclick="handleDelete('${g.id}')" class="text-red-500 font-bold">Delete</button>
                </div>
            `).join('');
        };
    </script>

    <script>
        function navigateTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
        function showAdmin() { if(prompt("Password") === "admin123") navigateTo('adminPage'); }
        function openModal() { document.getElementById('girlModal').classList.add('active'); }
        function closeModal() { document.getElementById('girlModal').classList.remove('active'); }
    </script>
</body>
</html>
