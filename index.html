<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoiCarList | Professional Services</title>
    <meta property="og:title" content="MoiCarList | 专业服务预约">
    <meta property="og:image" content="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(20, 20, 20, 0.98); padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .nav-link { cursor: pointer; color: #aaa; font-size: 11px; font-weight: 600; text-transform: uppercase; transition: color 0.3s; }
        .nav-link:hover { color: var(--gold); }
        .lang-toggle { color: var(--gold); font-size: 12px; font-weight: bold; border: 1px solid #333; padding: 2px 8px; border-radius: 4px; background: #111; min-width: 40px; }
        
        .hero-section { background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); padding: 35px 20px; text-align: center; border-bottom: 1px solid #222; }
        
        .area-button { background: #111; border: 1px solid var(--gold); transition: 0.2s; cursor: pointer; font-size: 12px; padding: 8px 4px; border-radius: 8px; }
        .area-button.active { background: var(--gold); color: #000; font-weight: bold; }

        .card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; }
        .card-img { width: 100%; height: 220px; object-fit: contain; background: #000; border-bottom: 1px solid #111; }
        
        .gold-text { color: var(--gold); font-weight: 600; }
        .white-name { color: #ffffff; font-weight: 700; font-size: 15px; } 
        
        .status-mini { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .available { background: var(--whatsapp); color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .nation-tag { font-size: 9px; background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3); }

        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        
        input, select, textarea { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; width: 100%; margin: 4px 0; font-size: 14px; }
        .btn-preset { background: #222; font-size: 10px; padding: 5px 8px; border-radius: 4px; color: var(--gold); border: 1px solid #444; }
        .admin-item { background: #0a0a0a; border-bottom: 1px solid #222; padding: 8px; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

    <script>
        // --- 核心语言配置 ---
        const translations = {
            en: {
                home: "HOME",
                welcome: "Welcome to MoiCarList",
                subtitle: "Your Trusted Choice for Professional Services",
                available: "✨ Available Today",
                allNations: "All Nations",
                back: "← BACK",
                booking: "WHATSAPP BOOKING"
            },
            cn: {
                home: "首页",
                welcome: "欢迎来到 MoiCarList",
                subtitle: "您值得信赖的专业服务选择",
                available: "✨ 今日在线",
                allNations: "所有国籍",
                back: "← 返回",
                booking: "WHATSAPP 预约"
            },
            bm: {
                home: "UTAMA",
                welcome: "Selamat Datang ke MoiCarList",
                subtitle: "Pilihan Dipercayai untuk Perkhidmatan Profesional",
                available: "✨ Tersedia Hari Ini",
                allNations: "Semua Negara",
                back: "← KEMBALI",
                booking: "TEMPAHAN WHATSAPP"
            }
        };

        const langLabels = { en: "EN", cn: "中", bm: "BM" };
        let currentLang = 'en';

        function updateTexts() {
            const t = translations[currentLang];
            document.getElementById('nav-home').innerText = t.home;
            document.getElementById('hero-title').innerText = t.welcome;
            document.getElementById('hero-desc').innerText = t.subtitle;
            document.getElementById('section-title').innerText = t.available;
            document.getElementById('btn-lang-toggle').innerText = langLabels[currentLang];
            
            // 重新渲染主页以更新下拉框和详情页文字
            if (typeof renderEverything === "function") renderEverything();
        }

        function toggleLang() {
            const keys = Object.keys(translations);
            let idx = keys.indexOf(currentLang);
            currentLang = keys[(idx + 1) % keys.length];
            updateTexts();
        }
    </script>

    <nav>
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="gold-text text-xl cursor-pointer font-bold" onclick="navigateTo('home')">MoiCarList</div>
            <div class="flex gap-4 items-center">
                <a id="nav-home" onclick="navigateTo('home')" class="nav-link hidden md:block">HOME</a>
                <button id="btn-lang-toggle" onclick="toggleLang()" class="lang-toggle">EN</button>
                <a href="#" onclick="window.open('https://t.me/MoiCarList', '_blank'); return false;" class="text-[#0088cc]">
                    <svg style="width:20px;height:20px" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.12 7.14-.14.72-.41.96-.66.98-.56.05-1-.38-1.54-.74-.83-.57-1.3-1.07-2.12-1.6-.94-.61-.33-.95.21-1.5.14-.14 2.53-2.32 2.58-2.52.01-.03.01-.13-.05-.18-.06-.05-.15-.03-.21-.02-.09.02-1.48.94-4.18 2.76-.39.27-.75.4-1.07.39-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.28-.36.77-.55 3.02-1.31 5.03-2.18 6.04-2.6.96-.4 1.99-.48 2.65-.48.14 0 .47.03.68.16.19.11.26.27.28.42.02.16.02.32.01.48z"/></svg>
                </a>
                <a onclick="showAdmin()" class="nav-link">ADMIN</a>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="hero-section">
            <h1 id="hero-title" class="text-2xl md:text-4xl font-bold text-[#d4af37] mb-2">Welcome to MoiCarList</h1>
            <p id="hero-desc" class="text-gray-400 text-xs md:text-sm">Your Trusted Choice for Professional Services</p>
        </div>

        <div class="max-w-6xl mx-auto px-4 py-6">
            <div id="areaButtons" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-8 text-center"></div>
            
            <div class="flex justify-between items-center mb-6">
                <h2 id="section-title" class="text-lg font-bold gold-text flex items-center gap-2">✨ Available Today</h2>
                <select id="nationFilter" onchange="selectNation(this.value)" class="bg-[#111] text-[#d4af37] border border-[#333] rounded px-2 py-1 text-[11px] w-auto m-0 outline-none cursor-pointer">
                </select>
            </div>

            <div id="displayList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-2xl mx-auto p-4 pb-20">
            <div id="back-btn-text" class="mb-4 gold-text font-bold cursor-pointer flex items-center gap-1" onclick="navigateTo('home')">← BACK</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="adminPage" class="page bg-[#050505]">
        <div class="max-w-4xl mx-auto p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold gold-text">Admin Panel</h2>
                <button onclick="openModal()" class="bg-[#d4af37] text-black px-4 py-1 rounded-full font-bold text-sm">+ Add</button>
            </div>
            <div id="adminList" class="space-y-1"></div>
        </div>
    </div>

    <div id="girlModal" class="modal">
        <div class="bg-[#111] p-6 rounded-xl w-full max-w-sm max-h-[90vh] overflow-y-auto border border-[#222]">
            <h3 id="modalTitle" class="gold-text font-bold mb-4">Add Profile</h3>
            <input type="hidden" id="editId">
            <input type="text" id="gName" placeholder="Name">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="gAge" placeholder="Age">
                <select id="gNation">
                    <option value="Thailand">Thailand</option>
                    <option value="Vietnam">Vietnam</option>
                    <option value="Malaysia">Malaysia</option>
                    <option value="Indonesia">Indonesia</option>
                    <option value="Laos">Laos</option>
                    <option value="China">China</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-2"><input type="text" id="gCup" placeholder="Cup"><input type="text" id="gHeight" placeholder="Height"></div>
            <select id="gArea"><option>Alor Setar</option><option>Sungei Petani</option><option>Bukit Mertajam</option><option>Penang</option><option>Ipoh</option></select>
            <select id="gStatus"><option value="available">Available</option><option value="busy">Busy</option></select>
            
            <div class="flex gap-2 my-2">
                <button onclick="setPrice(250)" class="btn-preset">Set 250/500/750</button>
                <button onclick="setPrice(270)" class="btn-preset">Set 270/540/810</button>
            </div>
            <div class="grid grid-cols-3 gap-1">
                <input type="number" id="gPrice1" placeholder="1s">
                <input type="number" id="gPrice2" placeholder="2s">
                <input type="number" id="gPrice3" placeholder="3h">
            </div>

            <div class="mt-2 border border-[#333] p-2 rounded">
                <div class="flex gap-2 items-center">
                    <input type="text" id="gPhoto" placeholder="Photo URL" style="margin:0">
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-gray-700 px-3 py-2 rounded text-[10px] font-bold text-white">UPLOAD</button>
                </div>
                <div id="uploadStatus" class="text-[10px] text-gray-500 mt-1">Ready</div>
            </div>

            <input type="text" id="gWhatsapp" placeholder="WhatsApp" value="601117917032">
            <textarea id="gDesc" placeholder="Bio" rows="2"></textarea>
            
            <button onclick="handleSave()" id="btnSave" class="w-full bg-[#d4af37] text-black font-bold py-3 rounded-lg mt-4 text-sm">SAVE DATA</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-3 text-xs">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs",
            authDomain: "girlcarlist-db.firebaseapp.com",
            projectId: "girlcarlist-db",
            storageBucket: "girlcarlist-db.firebasestorage.app",
            messagingSenderId: "418933639880",
            appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "girls");
        let allData = [];
        let currentArea = 'Alor Setar';
        let currentNation = 'All';

        // --- 图床配置 (记得填你的 KEY) ---
        const MY_IMGBB_API_KEY = "3f8723989ab21d54c92cea20af39fa0b"; 

        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('uploadStatus');
            status.innerText = "Uploading...";
            const formData = new FormData();
            formData.append('image', file);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${MY_IMGBB_API_KEY}`, { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('gPhoto').value = result.data.url;
                    status.innerText = "Upload Success ✅";
                    status.style.color = "#25D366";
                }
            } catch (err) { status.innerText = "Error!"; }
        });

        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            window.renderEverything();
        });

        window.renderEverything = () => {
            renderAreaButtons();
            const filtered = allData.filter(g => g.area === currentArea);
            const nations = ['All', ...new Set(filtered.map(g => g.nation))];
            renderNationFilter(nations);
            const finalData = currentNation === 'All' ? filtered : filtered.filter(g => g.nation === currentNation);
            renderMain(finalData);
            renderAdmin(allData);
            
            // 确保返回按钮文字也更新
            document.getElementById('back-btn-text').innerText = translations[currentLang].back;
        };

        window.renderAreaButtons = () => {
            const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];
            document.getElementById('areaButtons').innerHTML = areas.map(a => `
                <div class="area-button ${currentArea === a ? 'active' : ''}" onclick="selectArea('${a}')">${a}</div>
            `).join('');
        };

        window.selectArea = (a) => { currentArea = a; currentNation = 'All'; window.renderEverything(); };

        function renderNationFilter(nations) {
            const select = document.getElementById('nationFilter');
            const allLabel = translations[currentLang].allNations;
            select.innerHTML = nations.map(n => `<option value="${n}">${n === 'All' ? allLabel : n}</option>`).join('');
            select.value = currentNation;
        }
        window.selectNation = (n) => { currentNation = n; window.renderEverything(); };

        window.renderMain = (data) => {
            document.getElementById('displayList').innerHTML = data.map(g => `
                <div class="card shadow-lg" onclick="showDetail('${g.id}')">
                    <img src="${g.photo}" class="card-img">
                    <div class="p-2">
                        <div class="flex justify-between items-center mb-1 gap-1">
                             <span class="white-name truncate">${g.name}</span>
                             <span class="status-mini ${g.status}">${g.status}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="gold-text text-[10px] opacity-80">${g.age}Y | ${g.cup} | ${g.height}</span>
                            <span class="nation-tag">${g.nation}</span>
                        </div>
                    </div>
                </div>`).join('');
        };

        window.showDetail = (id) => {
            const g = allData.find(x => x.id === id);
            navigateTo('detailPage');
            const t = translations[currentLang];
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-xl mb-4 shadow-xl">
                <div class="text-left px-2">
                    <div class="flex items-center gap-2 mb-1">
                        <h1 class="text-2xl font-bold text-white">${g.name}</h1>
                        <span class="nation-tag">${g.nation}</span>
                    </div>
                    <p class="gold-text text-sm mb-6">${g.age}Y | ${g.cup} | ${g.height}</p>
                    <div class="grid gap-2 mb-6">
                        <div class="bg-[#111] p-3 rounded-lg flex justify-between"><span>1shot (45min)</span><span class="gold-text font-bold">RM ${g.p1}</span></div>
                        <div class="bg-[#111] p-3 rounded-lg flex justify-between"><span>2shot (90min)</span><span class="gold-text font-bold">RM ${g.p2}</span></div>
                        <div class="bg-[#111] p-3 rounded-lg flex justify-between"><span>3Shot (3 Hours)</span><span class="gold-text font-bold">RM ${g.p3}</span></div>
                    </div>
                    <div class="bg-[#111] p-4 rounded-lg text-gray-400 text-xs leading-relaxed border-l-2 border-[#d4af37]">${g.desc}</div>
                    <a href="https://wa.me/${g.whatsapp}" target="_blank" class="block w-full bg-[#25D366] text-white font-bold py-3 rounded-xl mt-6 text-center shadow-lg uppercase">${t.booking}</a>
                </div>`;
        };

        window.handleSave = async () => {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('gName').value, age: document.getElementById('gAge').value,
                nation: document.getElementById('gNation').value, cup: document.getElementById('gCup').value,
                height: document.getElementById('gHeight').value, p1: document.getElementById('gPrice1').value,
                p2: document.getElementById('gPrice2').value, p3: document.getElementById('gPrice3').value,
                area: document.getElementById('gArea').value, status: document.getElementById('gStatus').value,
                photo: document.getElementById('gPhoto').value, whatsapp: document.getElementById('gWhatsapp').value,
                desc: document.getElementById('gDesc').value
            };
            if(id) await updateDoc(doc(db, "girls", id), data);
            else await addDoc(colRef, data);
            closeModal();
        };

        window.handleEdit = (id) => {
            const g = allData.find(x => x.id === id);
            openModal(true);
            document.getElementById('editId').value = g.id;
            document.getElementById('gName').value = g.name;
            document.getElementById('gAge').value = g.age;
            document.getElementById('gNation').value = g.nation;
            document.getElementById('gCup').value = g.cup;
            document.getElementById('gHeight').value = g.height;
            document.getElementById('gPrice1').value = g.p1;
            document.getElementById('gPrice2').value = g.p2;
            document.getElementById('gPrice3').value = g.p3;
            document.getElementById('gArea').value = g.area;
            document.getElementById('gStatus').value = g.status;
            document.getElementById('gPhoto').value = g.photo;
            document.getElementById('gWhatsapp').value = g.whatsapp;
            document.getElementById('gDesc').value = g.desc;
        };

        window.handleDelete = async id => { if(confirm('Delete?')) await deleteDoc(doc(db, "girls", id)); };

        window.renderAdmin = (data) => {
            const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];
            let html = "";
            areas.forEach(area => {
                const list = data.filter(g => g.area === area);
                html += `<div class="bg-[#111] px-3 py-1 text-[10px] gold-text mt-4 uppercase font-bold border-l-2 border-[#d4af37]">${area} (${list.length})</div>`;
                list.forEach(g => {
                    html += `<div class="admin-item"><div class="flex items-center gap-3 w-[70%]"><img src="${g.photo}" class="w-8 h-8 rounded-full object-cover border border-[#333]"><div class="text-xs truncate w-full"><div class="font-bold text-white truncate">${g.name}</div></div></div><div class="flex gap-2"><button onclick="handleEdit('${g.id}')" class="text-blue-400 text-[10px] font-bold px-2 py-1 bg-blue-900/20 rounded">Edit</button><button onclick="handleDelete('${g.id}')" class="text-red-500 text-[10px] font-bold px-2 py-1 bg-red-900/20 rounded">Del</button></div></div>`;
                });
            });
            document.getElementById('adminList').innerHTML = html;
        };
    </script>

    <script>
        function navigateTo(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
        function showAdmin() { if(prompt("Pass") === "KAR#1999") navigateTo('adminPage'); }
        function openModal(isEdit = false) { 
            if(!isEdit) {
                document.getElementById('modalTitle').innerText = "Add Profile";
                document.getElementById('editId').value = "";
                document.getElementById('gPhoto').value = "";
                document.getElementById('gName').value = "";
                document.getElementById('gDesc').value = "";
                document.getElementById('uploadStatus').innerText = "Ready";
            }
            document.getElementById('girlModal').classList.add('active'); 
        }
        function closeModal() { document.getElementById('girlModal').classList.remove('active'); }
        window.setPrice = (base) => {
            document.getElementById('gPrice1').value = base;
            document.getElementById('gPrice2').value = base * 2;
            document.getElementById('gPrice3').value = base * 3;
        };
    </script>
</body>
</html>
