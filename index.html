<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GirlCarList | Premium Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --apple-gray: #1d1d1f; }
        body { font-family: 'Poppins', sans-serif; background: #000000; color: #f5f5f7; overflow-x: hidden; }
        nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        .area-pill { background: #1d1d1f; border: 1px solid #333; color: #f5f5f7; padding: 8px 20px; border-radius: 20px; font-size: 14px; transition: 0.3s; cursor: pointer; white-space: nowrap; }
        .area-pill:hover { background: var(--gold); color: #000; border-color: var(--gold); }
        .girl-card { background: #1d1d1f; border-radius: 20px; overflow: hidden; transition: 0.5s ease; border: 1px solid #222; }
        .girl-card:hover { transform: scale(1.02); border-color: var(--gold); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .available { background: #30d158; color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1c1c1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 600; padding: 12px 20px; border-radius: 12px; transition: 0.3s; cursor: pointer; border:none; }
        .btn-gold:hover { opacity: 0.8; }
        input, textarea, select { background: #2c2c2e; border: 1px solid #3d3d3f; border-radius: 10px; padding: 12px; color: #fff; width: 100%; margin: 8px 0; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <div class="max-w-6xl mx-auto px-6 h-14 flex justify-between items-center">
            <div class="text-xl font-bold text-[#d4af37] cursor-pointer" onclick="navigateTo('home')">GirlCarList</div>
            <div class="flex gap-6 text-sm font-medium">
                <span onclick="navigateTo('home')" class="hover:text-[#d4af37] cursor-pointer">Home</span>
                <span onclick="showAdminLogin()" class="hover:text-[#d4af37] cursor-pointer">Admin</span>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="pt-16 pb-10 text-center px-4">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6 tracking-tight">Welcome to <span class="text-[#d4af37]">GirlCarList</span></h1>
            <div class="flex flex-wrap justify-center gap-2 mt-8 max-w-4xl mx-auto">
                <div class="area-pill" onclick="showArea('Alor Setar')">Alor Setar</div>
                <div class="area-pill" onclick="showArea('Sungei Petani')">Sungei Petani</div>
                <div class="area-pill" onclick="showArea('Penang')">Penang</div>
                <div class="area-pill" onclick="showArea('Bukit Mertajam')">Bukit Mertajam</div>
                <div class="area-pill" onclick="showArea('Ipoh')">Ipoh</div>
            </div>
        </div>
        <div class="max-w-6xl mx-auto px-6 py-12 border-t border-[#1a1a1a]">
            <h2 class="text-2xl font-bold mb-8">Available Today</h2>
            <div id="todayAvailable" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="areaPage" class="page">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <div class="mb-8 text-[#d4af37] font-medium cursor-pointer" onclick="navigateTo('home')">← Back to Home</div>
            <h1 id="areaTitle" class="text-4xl font-bold mb-10"></h1>
            <div id="areaGirls" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="max-w-4xl mx-auto px-6 py-10">
            <div class="mb-8 text-[#d4af37] font-medium cursor-pointer" onclick="navigateTo('home')">← Back to Home</div>
            <div class="grid md:grid-cols-2 gap-10">
                <div id="photoCarousel" class="rounded-3xl overflow-hidden aspect-[3/4] bg-[#1d1d1f]"></div>
                <div id="profileInfo"></div>
            </div>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-[#d4af37]">Admin Dashboard</h1>
                <button onclick="logout()" class="text-red-500 font-medium">Logout</button>
            </div>
            <button onclick="openModal()" class="btn-gold mb-8">+ Add New Girl</button>
            <div class="overflow-x-auto">
                <table class="w-full text-left bg-[#111] rounded-2xl overflow-hidden">
                    <thead class="bg-[#1d1d1f] text-gray-400 text-xs uppercase">
                        <tr><th class="p-4">Photo</th><th class="p-4">Name</th><th class="p-4">Area</th><th class="p-4">Status</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="adminListBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold text-[#d4af37] mb-6 text-center">Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Enter Password">
            <button onclick="checkLogin()" class="btn-gold mt-4 w-full">Sign In</button>
            <button onclick="closeModals()" class="w-full text-gray-500 mt-4 text-sm">Cancel</button>
        </div>
    </div>

    <div id="girlModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" class="text-xl font-bold text-[#d4af37] mb-4">Add Girl Profile</h2>
            <input type="text" id="gName" placeholder="Name">
            <input type="number" id="gAge" placeholder="Age">
            <input type="number" id="gPrice" placeholder="Price (RM)">
            <select id="gArea">
                <option value="Alor Setar">Alor Setar</option>
                <option value="Sungei Petani">Sungei Petani</option>
                <option value="Penang">Penang</option>
                <option value="Bukit Mertajam">Bukit Mertajam</option>
                <option value="Ipoh">Ipoh</option>
            </select>
            <select id="gStatus">
                <option value="available">Available</option>
                <option value="busy">Busy</option>
            </select>
            <input type="text" id="gWhatsapp" placeholder="WA Number (e.g. 60123456789)">
            <input type="text" id="gPhoto" placeholder="Photo URL (Link)">
            <textarea id="gDesc" placeholder="Brief description (e.g. Sweet & Caring)" rows="3"></textarea>
            <button onclick="saveGirl()" class="btn-gold mt-4 w-full">Save Profile</button>
            <button onclick="closeModals()" class="w-full text-gray-500 mt-4 text-sm">Close</button>
        </div>
    </div>

    <script>
        let girls = JSON.parse(localStorage.getItem('girlList')) || [];
        let editingId = null;

        function saveToStorage() { localStorage.setItem('girlList', JSON.stringify(girls)); render(); }

        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            window.scrollTo(0,0);
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function showAdminLogin() { document.getElementById('loginModal').classList.add('active'); }

        function checkLogin() {
            if (document.getElementById('adminPass').value === 'admin123') {
                closeModals(); navigateTo('adminPage'); renderAdmin();
            } else { alert('Wrong Password'); }
        }

        function logout() { navigateTo('home'); }

        function openModal(id = null) {
            editingId = id;
            const modal = document.getElementById('girlModal');
            document.getElementById('modalTitle').innerText = id ? 'Edit Profile' : 'Add New Girl';
            if(id) {
                const g = girls.find(x => x.id === id);
                document.getElementById('gName').value = g.name;
                document.getElementById('gAge').value = g.age;
                document.getElementById('gPrice').value = g.price;
                document.getElementById('gArea').value = g.area;
                document.getElementById('gStatus').value = g.status;
                document.getElementById('gWhatsapp').value = g.whatsapp;
                document.getElementById('gPhoto').value = g.photos[0];
                document.getElementById('gDesc').value = g.description;
            } else {
                document.querySelectorAll('#girlModal input, #girlModal textarea').forEach(i => i.value = '');
            }
            modal.classList.add('active');
        }

        function saveGirl() {
            const data = {
                id: editingId || Date.now().toString(),
                name: document.getElementById('gName').value,
                age: document.getElementById('gAge').value,
                price: document.getElementById('gPrice').value,
                area: document.getElementById('gArea').value,
                status: document.getElementById('gStatus').value,
                whatsapp: document.getElementById('gWhatsapp').value,
                photos: [document.getElementById('gPhoto').value || 'https://via.placeholder.com/300x400'],
                description: document.getElementById('gDesc').value
            };

            if (editingId) {
                const index = girls.findIndex(x => x.id === editingId);
                girls[index] = data;
            } else { girls.push(data); }

            saveToStorage();
            closeModals();
            renderAdmin();
        }

        function deleteGirl(id) { if(confirm('Delete this?')) { girls = girls.filter(x => x.id !== id); saveToStorage(); renderAdmin(); } }

        function showArea(area) {
            document.getElementById('areaTitle').innerText = area;
            const filtered = girls.filter(g => g.area === area);
            document.getElementById('areaGirls').innerHTML = filtered.map(renderCard).join('') || '<p class="text-gray-500">No profiles here yet.</p>';
            navigateTo('areaPage');
        }

        function showProfile(id) {
            const g = girls.find(x => x.id === id);
            document.getElementById('photoCarousel').innerHTML = `<img src="${g.photos[0]}" class="w-full h-full object-cover">`;
            document.getElementById('profileInfo').innerHTML = `
                <h1 class="text-4xl font-bold mb-4">${g.name} <span class="text-lg text-gray-500 ml-2">${g.age}</span></h1>
                <div class="text-3xl text-[#d4af37] font-bold mb-6">RM ${g.price}</div>
                <div class="status-badge inline-block ${g.status === 'available' ? 'available' : 'busy'} mb-8">${g.status}</div>
                <p class="text-gray-400 mb-8">${g.description}</p>
                <a href="https://wa.me/${g.whatsapp}" class="btn-gold block text-center">WhatsApp Booking</a>
            `;
            navigateTo('profilePage');
        }

        function renderCard(g) {
            return `
                <div class="girl-card" onclick="showProfile('${g.id}')">
                    <img src="${g.photos[0]}" class="w-full h-72 object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold text-lg">${g.name}</span>
                            <span class="status-badge ${g.status === 'available' ? 'available' : 'busy'}"></span>
                        </div>
                        <div class="text-[#d4af37] font-bold">RM ${g.price}</div>
                        <div class="text-xs text-gray-500 mt-2">${g.area}</div>
                    </div>
                </div>
            `;
        }

        function renderAdmin() {
            document.getElementById('adminListBody').innerHTML = girls.map(g => `
                <tr class="border-b border-[#222]">
                    <td class="p-4"><img src="${g.photos[0]}" class="w-10 h-10 rounded-full object-cover"></td>
                    <td class="p-4 font-bold">${g.name}</td>
                    <td class="p-4 text-gray-400 text-sm">${g.area}</td>
                    <td class="p-4"><span class="status-badge ${g.status === 'available' ? 'available' : 'busy'}">${g.status}</span></td>
                    <td class="p-4 flex gap-4">
                        <button onclick="openModal('${g.id}')" class="text-blue-400">Edit</button>
                        <button onclick="deleteGirl('${g.id}')" class="text-red-400">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function render() {
            document.getElementById('todayAvailable').innerHTML = girls.map(renderCard).join('') || '<p class="text-gray-500">Waiting for data...</p>';
        }

        render();
    </script>
</body>
</html>
