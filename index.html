<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MD8RMMY2TZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MD8RMMY2TZ');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoiCarList | Professional Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        
        /* 导航栏样式 */
        nav { background: rgba(20, 20, 20, 0.98); padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .nav-link { cursor: pointer; color: #aaa; font-size: 11px; font-weight: 600; text-transform: uppercase; transition: color 0.3s; }
        .nav-link:hover { color: var(--gold); }
        .lang-toggle { color: var(--gold); font-size: 12px; font-weight: bold; border: 1px solid #333; padding: 2px 8px; border-radius: 4px; background: #111; }

        /* UI 组件 */
        .hero-section { background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); padding: 35px 20px; text-align: center; border-bottom: 1px solid #222; }
        .area-button { background: #111; border: 1px solid var(--gold); transition: 0.2s; cursor: pointer; font-size: 12px; padding: 8px 4px; border-radius: 8px; color: #fff; }
        .area-button.active { background: var(--gold); color: #000; font-weight: bold; }
        .card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card-img { width: 100%; height: 220px; object-fit: contain; background: #000; }
        
        /* 弹窗样式 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        input, select, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; width: 100%; margin: 6px 0; outline: none; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; text-transform: uppercase; }
        
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="text-[#d4af37] text-xl font-bold cursor-pointer" onclick="navigateTo('home')">MoiCarList</div>
            <div class="flex gap-4 items-center">
                <div id="user-info" class="hidden flex items-center gap-3">
                    <span id="user-display" class="text-xs text-gold font-bold">User</span>
                    <a id="admin-link" onclick="navigateTo('adminPage')" class="nav-link text-blue-400 hidden">ADMIN</a>
                    <button onclick="handleLogout()" class="text-[10px] text-red-500 font-bold border border-red-900 px-2 py-1 rounded">LOGOUT</button>
                </div>
                <div id="auth-buttons">
                    <button onclick="openAuthModal('login')" class="nav-link">LOGIN / JOIN</button>
                </div>
                <button onclick="toggleLang()" id="btn-lang-toggle" class="lang-toggle text-[10px]">EN</button>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="hero-section">
            <h1 class="text-2xl font-bold text-gold mb-2">Welcome to MoiCarList</h1>
            <p class="text-gray-400 text-xs">Your Trusted Choice</p>
        </div>
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div id="areaButtons" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-6"></div>
            <div id="displayList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="adminPage" class="page bg-[#050505]">
        <div class="max-w-4xl mx-auto p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gold">ADMIN DASHBOARD</h2>
                <button onclick="openEditModal()" class="bg-gold text-black px-4 py-1 rounded-full text-sm font-bold">+ ADD NEW</button>
            </div>
            <div id="adminList" class="space-y-2"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-2xl mx-auto p-4">
            <button onclick="navigateTo('home')" class="text-gold font-bold mb-4">← BACK</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-[#222]">
            <h3 id="authTitle" class="text-gold font-bold mb-6 text-center text-xl">LOGIN</h3>
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-lg flex items-center justify-center gap-3 text-sm mb-6">
                <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google Login
            </button>
            <input type="email" id="authEmail" placeholder="Email Address">
            <input type="password" id="authPassword" placeholder="Password (min 6 chars)">
            <button id="authSubmitBtn" onclick="processAuth()" class="btn-gold mt-4">Login</button>
            <p onclick="toggleAuthMode()" class="text-center text-[11px] text-gray-500 mt-6 cursor-pointer underline">Switch Login / Register</p>
            <button onclick="closeAuthModal()" class="w-full text-gray-700 mt-4 text-xs">CANCEL</button>
        </div>
    </div>

    <div id="usernameModal" class="modal">
        <div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-gold text-center">
            <h3 class="text-gold font-bold mb-2">Almost Done!</h3>
            <p class="text-xs text-gray-400 mb-4">Choose a unique username</p>
            <input type="text" id="newUsername" placeholder="Your Username">
            <button onclick="saveUsername()" class="btn-gold mt-4">Save & Continue</button>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="bg-[#111] p-6 rounded-xl w-full max-w-sm max-h-[90vh] overflow-y-auto border border-[#222]">
            <h3 class="text-gold font-bold mb-4">Profile Editor</h3>
            <input type="hidden" id="editId">
            <input type="text" id="gName" placeholder="Name">
            <input type="text" id="gPhoto" placeholder="Image URL">
            <input type="text" id="gArea" placeholder="Area (e.g. Alor Setar)">
            <input type="text" id="gWhatsapp" placeholder="WhatsApp (60xxx)">
            <button onclick="handleSave()" class="btn-gold mt-4">SAVE CHANGES</button>
            <button onclick="closeEditModal()" class="w-full text-gray-600 mt-4 text-xs">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 配置 (已填入你的配置)
        const firebaseConfig = { 
            apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs", 
            authDomain: "girlcarlist-db.firebaseapp.com", 
            projectId: "girlcarlist-db", 
            storageBucket: "girlcarlist-db.firebasestorage.app", 
            appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "girls");

        // ⚠️ 请在这里填入你的 UID (可以在 Console 看到)
        const ADMIN_UID = "填入你的UID"; 

        let allData = [];
        let authMode = 'login';

        // --- Auth 核心逻辑 ---
        window.openAuthModal = (m) => { 
            authMode = m; 
            document.getElementById('authTitle').innerText = m.toUpperCase();
            document.getElementById('authSubmitBtn').innerText = m === 'login' ? 'Login' : 'Create Account';
            document.getElementById('authModal').classList.add('active'); 
        };
        window.closeAuthModal = () => document.getElementById('authModal').classList.remove('active');
        window.toggleAuthMode = () => openAuthModal(authMode === 'login' ? 'register' : 'login');

        window.processAuth = async () => {
            const e = document.getElementById('authEmail').value;
            const p = document.getElementById('authPassword').value;
            try {
                if(authMode === 'register') await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
                closeAuthModal();
            } catch(err) { alert(err.message); }
        };

        window.loginWithGoogle = async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); closeAuthModal(); } catch(e) { alert(e.message); }
        };

        window.handleLogout = () => { signOut(auth); navigateTo('home'); };

        onAuthStateChanged(auth, async (user) => {
            const userInfo = document.getElementById('user-info');
            const authBtns = document.getElementById('auth-buttons');
            const adminLink = document.getElementById('admin-link');
            
            if(user) {
                console.log("LOGGED IN UID:", user.uid);
                userInfo.classList.remove('hidden');
                authBtns.classList.add('hidden');
                
                // 权限判断
                if(user.uid === ADMIN_UID) adminLink.classList.remove('hidden');
                else adminLink.classList.add('hidden');

                const uDoc = await getDoc(doc(db, "users", user.uid));
                if(uDoc.exists()) document.getElementById('user-display').innerText = uDoc.data().username;
                else document.getElementById('usernameModal').classList.add('active');
            } else {
                userInfo.classList.add('hidden');
                authBtns.classList.remove('hidden');
            }
        });

        window.saveUsername = async () => {
            const name = document.getElementById('newUsername').value.trim();
            if(!name) return;
            await setDoc(doc(db, "users", auth.currentUser.uid), {username: name}, {merge:true});
            document.getElementById('user-display').innerText = name;
            document.getElementById('usernameModal').classList.remove('active');
        };

        // --- 数据渲染逻辑 ---
        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderUI();
        });

        function renderUI() {
            const list = document.getElementById('displayList');
            list.innerHTML = allData.map(g => `
                <div class="card" onclick="showDetail('${g.id}')">
                    <img src="${g.photo}" class="card-img">
                    <div class="p-3"><p class="font-bold">${g.name}</p><p class="text-[10px] text-gold">${g.area}</p></div>
                </div>`).join('');

            const adminList = document.getElementById('adminList');
            adminList.innerHTML = allData.map(g => `
                <div class="flex justify-between items-center bg-[#111] p-3 rounded">
                    <div class="text-sm">${g.name}</div>
                    <button onclick="handleDelete('${g.id}')" class="text-red-500 text-xs">DELETE</button>
                </div>`).join('');
        }

        window.showDetail = (id) => {
            const g = allData.find(x => x.id === id);
            navigateTo('detailPage');
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-2xl mb-4">
                <h2 class="text-2xl font-bold">${g.name}</h2>
                <p class="text-gold mb-4">${g.area}</p>
                <a href="https://wa.me/${g.whatsapp}" class="block bg-green-500 text-white text-center py-3 rounded-xl font-bold">CONTACT NOW</a>
            `;
        };

        window.handleDelete = async (id) => { if(confirm('Delete?')) await deleteDoc(doc(db, "girls", id)); };

        // 全局导航
        window.navigateTo = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>

    <script>
        function openEditModal() { document.getElementById('editModal').classList.add('active'); }
        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
        function toggleLang() { alert('Language module coming soon!'); }
    </script>
</body>
</html>
