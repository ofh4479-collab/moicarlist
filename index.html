<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GirlCarList | Premium Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --apple-gray: #1d1d1f; }
        body { font-family: 'Poppins', sans-serif; background: #000000; color: #f5f5f7; overflow-x: hidden; }

        /* Apple Style Nav */
        nav { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
        
        /* Area Buttons - Apple Style Pill */
        .area-pill {
            background: #1d1d1f;
            border: 1px solid #333;
            color: #f5f5f7;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            white-space: nowrap;
        }
        .area-pill:hover { background: var(--gold); color: #000; border-color: var(--gold); }

        /* Card Apple Style */
        .girl-card {
            background: #1d1d1f;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.5s ease;
        }
        .girl-card:hover { transform: scale(1.02); }

        /* Status Badges */
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .available { background: #30d158; color: #fff; }
        .busy { background: #ff453a; color: #fff; }

        /* Apple Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1c1c1e; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; }

        .btn-gold { background: var(--gold); color: #000; font-weight: 600; padding: 12px; border-radius: 12px; width: 100%; transition: opacity 0.3s; }
        input { background: #3a3a3c; border: none; border-radius: 10px; padding: 12px; color: #fff; width: 100%; margin: 10px 0; }
        
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="max-w-6xl mx-auto px-6 h-12 flex justify-between items-center">
            <div class="text-lg font-semibold text-[#d4af37] cursor-pointer" onclick="navigateTo('home')">GirlCarList</div>
            <div class="flex gap-8 text-xs font-light tracking-wide">
                <a onclick="navigateTo('home')" class="hover:text-[#d4af37] cursor-pointer">Home</a>
                <a onclick="showAdminLogin()" class="hover:text-[#d4af37] cursor-pointer">Admin</a>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="pt-20 pb-10 text-center px-4">
            <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-4">Welcome to <span class="text-[#d4af37]">GirlCarList</span></h1>
            
            <div class="flex flex-wrap justify-center gap-3 mt-10 max-w-3xl mx-auto">
                <div class="area-pill" onclick="showArea('Alor Setar')">Alor Setar</div>
                <div class="area-pill" onclick="showArea('Sungei Petani')">Sungei Petani</div>
                <div class="area-pill" onclick="showArea('Penang')">Penang</div>
                <div class="area-pill" onclick="showArea('Bukit Mertajam')">Bukit Mertajam</div>
                <div class="area-pill" onclick="showArea('Ipoh')">Ipoh</div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto px-6 py-20">
            <h2 class="text-3xl font-bold mb-10">Available Today</h2>
            <div id="todayAvailable" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
        </div>
    </div>

    <div id="areaPage" class="page">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <div class="mb-10 text-[#d4af37] cursor-pointer" onclick="navigateTo('home')">← Back to Home</div>
            <h1 id="areaTitle" class="text-4xl font-bold mb-10"></h1>
            <div id="areaGirls" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
        </div>
    </div>

    <div id="profilePage" class="page">
        <div class="max-w-4xl mx-auto px-6 py-10">
            <div class="mb-8 text-[#d4af37] cursor-pointer inline-block" onclick="navigateTo('home')">← Back to Home</div>
            
            <div class="grid md:grid-cols-2 gap-10">
                <div id="photoCarousel" class="rounded-3xl overflow-hidden bg-[#1d1d1f]"></div>
                <div id="profileInfo"></div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 class="text-2xl font-bold text-[#d4af37] mb-6 text-center">Admin Login</h2>
            <form onsubmit="handleLogin(event)">
                <input type="password" id="adminPassword" placeholder="Enter Password" required>
                <button type="submit" class="btn-gold mt-4">Sign In</button>
                <button type="button" onclick="document.getElementById('loginModal').classList.remove('active')" class="w-full text-gray-500 mt-4 text-sm">Cancel</button>
            </form>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-bold text-[#d4af37]">Dashboard</h1>
                <button onclick="logout()" class="text-red-500">Logout</button>
            </div>
            <div id="adminContent" class="bg-[#1c1c1e] p-6 rounded-3xl border border-[#333]">
                <button onclick="openAddGirlModal()" class="btn-gold mb-6">+ Add Profile</button>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <tbody id="adminGirlsList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let girls = JSON.parse(localStorage.getItem('girlCarListData')) || [];
        let currentGirlId = null;
        let isLoggedIn = false;

        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            window.scrollTo(0, 0);
        }

        function showArea(area) {
            document.getElementById('areaTitle').innerText = area;
            const filtered = girls.filter(g => g.area === area);
            document.getElementById('areaGirls').innerHTML = filtered.length ? filtered.map(renderCard).join('') : '<p class="text-gray-500">Coming soon...</p>';
            navigateTo('areaPage');
        }

        function renderCard(girl) {
            return `
                <div class="girl-card cursor-pointer" onclick="showProfile('${girl.id}')">
                    <img src="${girl.photos[0]}" class="w-full h-80 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between mb-2">
                            <span class="font-bold">${girl.name}</span>
                            <span class="text-gray-400 text-sm">${girl.age}</span>
                        </div>
                        <div class="text-[#d4af37] font-bold text-lg mb-4">RM ${girl.price}</div>
                        <span class="status-badge ${girl.status === 'available' ? 'available' : 'busy'}">${girl.status}</span>
                    </div>
                </div>
            `;
        }

        function showProfile(id) {
            const girl = girls.find(g => g.id === id);
            if (!girl) return;
            document.getElementById('photoCarousel').innerHTML = `<img src="${girl.photos[0]}" class="w-full object-cover">`;
            document.getElementById('profileInfo').innerHTML = `
                <h2 class="text-4xl font-bold mb-4">${girl.name}</h2>
                <div class="text-2xl text-[#d4af37] font-bold mb-6">RM ${girl.price} / Hour</div>
                <p class="text-gray-400 leading-relaxed mb-8">${girl.description}</p>
                <div class="grid grid-cols-2 gap-4 text-sm border-t border-[#333] pt-8">
                    <div><span class="text-gray-500">Location</span><br>${girl.area}</div>
                    <div><span class="text-gray-500">Height</span><br>${girl.height}cm</div>
                </div>
                <a href="https://wa.me/${girl.whatsapp}" class="btn-gold mt-10 inline-block text-center">Book Now via WhatsApp</a>
            `;
            navigateTo('profilePage');
        }

        function showAdminLogin() { isLoggedIn ? navigateTo('adminPage') : document.getElementById('loginModal').classList.add('active'); }
        
        function handleLogin(e) {
            e.preventDefault();
            if (document.getElementById('adminPassword').value === 'admin123') { // 这里你可以改密码
                isLoggedIn = true;
                document.getElementById('loginModal').classList.remove('active');
                navigateTo('adminPage');
                renderAdminList();
            } else { alert('Wrong password'); }
        }

        function logout() { isLoggedIn = false; navigateTo('home'); }

        // 初始化显示
        function init() {
            const container = document.getElementById('todayAvailable');
            container.innerHTML = girls.length ? girls.map(renderCard).join('') : '<p class="text-gray-500">No profiles available yet.</p>';
        }

        init();
    </script>
</body>
</html>
