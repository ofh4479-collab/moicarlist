<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GirlCarList | Trilingual</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; --telegram: #0088cc; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        
        nav { background: rgba(26, 26, 26, 0.95); padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .nav-link { display: flex; align-items: center; gap: 6px; cursor: pointer; transition: 0.3s; color: #aaa; font-size: 12px; font-weight: 600; text-transform: uppercase; text-decoration: none; }
        .nav-link:hover, .nav-link.active-lang { color: var(--gold); }

        .hero-section { background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); padding: 60px 20px; text-align: center; border-bottom: 1px solid #222; }
        .area-button { background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); border: 2px solid #d4af37; transition: all 0.3s ease; cursor: pointer; }
        .area-button:hover { background: var(--gold); color: #000; transform: scale(1.05); }
        
        .card { background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .available { background: var(--whatsapp); color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        
        .btn-whatsapp { background: #25D366; color: white; font-weight: 700; padding: 14px; border-radius: 15px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-top: 20px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input, select, textarea { background: #222; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin: 5px 0; }
    </style>
</head>
<body>

    <script>
        // 1. 语言字典配置
        const i18n = {
            en: {
                welcome: "Welcome to GirlCarList",
                sub: "Your Trusted Choice for Professional Companionship and Massage in Malaysia",
                selectLoc: "Select Your Location",
                available: "✨ Available Today",
                back: "← BACK TO LIST",
                book: "WHATSAPP BOOKING NOW",
                about: "About Her",
                admin: "ADMIN",
                home: "HOME"
            },
            cn: {
                welcome: "欢迎来到 GirlCarList",
                sub: "马来西亚您最信赖的专业按摩与陪伴服务",
                selectLoc: "选择您的地区",
                available: "✨ 今日在位",
                back: "← 返回列表",
                book: "立即 WhatsApp 预约",
                about: "关于她",
                admin: "管理后台",
                home: "首页"
            },
            bm: {
                welcome: "Selamat Datang ke GirlCarList",
                sub: "Pilihan Dipercayai Anda untuk Peneman Profesional & Urutan di Malaysia",
                selectLoc: "Pilih Lokasi Anda",
                available: "✨ Tersedia Hari Ini",
                back: "← KEMBALI",
                book: "TEMPAH WHATSAPP SEKARANG",
                about: "Mengenai Dia",
                admin: "ADMIN",
                home: "UTAMA"
            }
        };

        let currentLang = 'en'; // 默认语言
        const myTelegramChannelUrl = "https://t.me/your_channel_username";

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.nav-lang').forEach(el => el.classList.remove('active-lang'));
            document.getElementById('lang-' + lang).classList.add('active-lang');
            updateUI();
        }

        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('txt-welcome').innerText = t.welcome;
            document.getElementById('txt-sub').innerText = t.sub;
            document.getElementById('txt-selectLoc').innerText = t.selectLoc;
            document.getElementById('txt-available').innerText = t.available;
            document.getElementById('nav-home').innerText = t.home;
            document.getElementById('nav-admin').innerText = t.admin;
            // 重新渲染地区和主列表以刷新语言
            renderAreaButtons();
        }
    </script>

    <nav>
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <div class="text-[#d4af37] font-bold text-2xl" onclick="navigateTo('home')">GirlCarList</div>
            <div class="flex gap-4 items-center">
                <a id="nav-home" onclick="navigateTo('home')" class="nav-link">HOME</a>
                <div class="flex border-x border-[#333] px-3 gap-2">
                    <span id="lang-cn" onclick="changeLang('cn')" class="nav-link nav-lang text-[10px]">CN</span>
                    <span id="lang-en" onclick="changeLang('en')" class="nav-link nav-lang active-lang text-[10px]">EN</span>
                    <span id="lang-bm" onclick="changeLang('bm')" class="nav-link nav-lang text-[10px]">BM</span>
                </div>
                <a href="#" onclick="window.open(myTelegramChannelUrl, '_blank'); return false;" class="nav-link text-[#0088cc]">TG</a>
                <a id="nav-admin" onclick="showAdmin()" class="nav-link">ADMIN</a>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="hero-section">
            <h1 id="txt-welcome" class="text-4xl md:text-5xl font-bold text-[#d4af37] mb-4">Welcome to GirlCarList</h1>
            <p id="txt-sub" class="text-gray-400 max-w-2xl mx-auto">Your Trusted Choice for Professional Companionship and Massage in Malaysia</p>
        </div>

        <div class="max-w-6xl mx-auto px-6 py-10">
            <h2 id="txt-selectLoc" class="text-center text-xl mb-6 font-semibold">Select Your Location</h2>
            <div id="areaButtons" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-12"></div>

            <h2 id="txt-available" class="text-2xl font-bold mb-8 text-[#d4af37]">✨ Available Today</h2>
            <div id="displayList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-2xl mx-auto p-6 pb-20">
            <div id="txt-back" class="mb-6 text-[#d4af37] font-bold cursor-pointer" onclick="navigateTo('home')">← BACK</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="max-w-4xl mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-[#d4af37]">Cloud Panel</h2>
                <button onclick="openModal()" class="bg-[#d4af37] text-black px-6 py-2 rounded-full font-bold">+ Add Profile</button>
            </div>
            <div id="adminList" class="space-y-4"></div>
        </div>
    </div>

    <div id="girlModal" class="modal">
        <div class="bg-[#1c1c1e] p-8 rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto border border-[#333]">
            <h3 class="text-[#d4af37] font-bold text-xl mb-4">Manage Profile</h3>
            <input type="text" id="gName" placeholder="Name">
            <input type="number" id="gAge" placeholder="Age">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="gCup" placeholder="Cup Size">
                <input type="text" id="gHeight" placeholder="Height">
            </div>
            <select id="gArea">
                <option>Alor Setar</option><option>Sungei Petani</option><option>Bukit Mertajam</option><option>Penang</option><option>Ipoh</option>
            </select>
            <select id="gStatus">
                <option value="available">Available Now</option><option value="busy">Busy</option>
            </select>
            <input type="number" id="gPrice1" placeholder="1shot RM">
            <input type="number" id="gPrice2" placeholder="2shot RM">
            <input type="number" id="gPrice3" placeholder="3Hours RM">
            <input type="text" id="gPhoto" placeholder="Photo URL">
            <input type="text" id="gWhatsapp" placeholder="WhatsApp Number">
            <textarea id="gDesc" placeholder="Bio/Description" rows="3"></textarea>
            <button onclick="handleSave()" class="w-full bg-[#d4af37] text-black font-bold py-3 rounded-xl mt-6">SAVE</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-4 text-xs">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs",
            authDomain: "girlcarlist-db.firebaseapp.com",
            projectId: "girlcarlist-db",
            storageBucket: "girlcarlist-db.firebasestorage.app",
            messagingSenderId: "418933639880",
            appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "girls");
        let allData = [];

        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderMain(allData);
            renderAdmin(allData);
            renderAreaButtons();
        });

        window.handleSave = async function() {
            const data = {
                name: document.getElementById('gName').value,
                age: document.getElementById('gAge').value,
                cup: document.getElementById('gCup').value,
                height: document.getElementById('gHeight').value,
                p1: document.getElementById('gPrice1').value,
                p2: document.getElementById('gPrice2').value,
                p3: document.getElementById('gPrice3').value,
                area: document.getElementById('gArea').value,
                status: document.getElementById('gStatus').value,
                photo: document.getElementById('gPhoto').value,
                whatsapp: document.getElementById('gWhatsapp').value,
                desc: document.getElementById('gDesc').value
            };
            await addDoc(colRef, data);
            closeModal();
        };

        window.handleDelete = async id => { if(confirm('Delete?')) await deleteDoc(doc(db, "girls", id)); };

        window.renderMain = function(data) {
            document.getElementById('displayList').innerHTML = data.map(g => `
                <div class="card shadow-lg" onclick="showDetail('${g.id}')">
                    <img src="${g.photo}" class="w-full h-80 object-cover border-b border-[#222]">
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-2xl text-white">${g.name}</span>
                            <span class="status-badge ${g.status}">${g.status}</span>
                        </div>
                        <div class="text-gray-400 text-sm mb-3 font-medium">${g.age}Y | ${g.cup} | ${g.height}</div>
                        <div class="text-[#d4af37] font-bold text-xl">RM ${g.p1}</div>
                    </div>
                </div>
            `).join('');
        };

        window.showDetail = function(id) {
            const g = allData.find(x => x.id === id);
            const t = i18n[currentLang];
            navigateTo('detailPage');
            document.getElementById('txt-back').innerText = t.back;
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-2xl mb-8 shadow-2xl border border-[#333]">
                <h1 class="text-4xl font-bold text-white">${g.name}</h1>
                <p class="text-[#d4af37] text-xl font-semibold mt-2">${g.age}Y | ${g.cup} | ${g.height}</p>
                
                <div class="grid gap-3 mt-8 mb-8">
                    <div class="bg-[#111] p-5 rounded-2xl border border-[#333] flex justify-between items-center">
                        <span class="text-gray-400">1shot (45min)</span><span class="text-[#d4af37] font-bold text-lg">RM ${g.p1}</span>
                    </div>
                    <div class="bg-[#111] p-5 rounded-2xl border border-[#333] flex justify-between items-center">
                        <span class="text-gray-400">2shot (90min)</span><span class="text-[#d4af37] font-bold text-lg">RM ${g.p2}</span>
                    </div>
                    <div class="bg-[#111] p-5 rounded-2xl border border-[#333] flex justify-between items-center">
                        <span class="text-gray-400">3Hours</span><span class="text-[#d4af37] font-bold text-lg">RM ${g.p3}</span>
                    </div>
                </div>

                <div class="bg-[#111] p-6 rounded-2xl border-l-4 border-[#d4af37] mb-10 text-left">
                    <h4 class="text-xs font-bold text-gray-500 uppercase mb-2">${t.about}</h4>
                    <p class="text-gray-300 leading-relaxed">${g.desc}</p>
                </div>

                <a href="https://wa.me/${g.whatsapp}" class="btn-whatsapp">
                    ${t.book}
                </a>
            `;
        };

        window.renderAreaButtons = function() {
            const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];
            document.getElementById('areaButtons').innerHTML = areas.map(a => `
                <div class="area-button p-4 rounded-xl text-center font-bold text-sm" onclick="filterArea('${a}')">
                    ${a}
                </div>
            `).join('');
        };

        window.filterArea = function(area) {
            const filtered = allData.filter(g => g.area === area);
            renderMain(filtered);
            window.scrollTo({ top: 600, behavior: 'smooth' });
        };

        window.renderAdmin = function(data) {
            document.getElementById('adminList').innerHTML = data.map(g => `
                <div class="flex items-center justify-between bg-[#111] p-4 rounded-xl border border-[#222]">
                    <div class="flex items-center gap-4 text-left">
                        <img src="${g.photo}" class="w-12 h-12 rounded-full object-cover">
                        <div><div class="font-bold">${g.name}</div><div class="text-xs text-gray-500">${g.area}</div></div>
                    </div>
                    <button onclick="handleDelete('${g.id}')" class="text-red-500 font-bold">Delete</button>
                </div>
            `).join('');
        };
    </script>

    <script>
        function navigateTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
        function showAdmin() { if(prompt("Password") === "admin123") navigateTo('adminPage'); }
        function openModal() { document.getElementById('girlModal').classList.add('active'); }
        function closeModal() { document.getElementById('girlModal').classList.remove('active'); }
    </script>
</body>
</html>
