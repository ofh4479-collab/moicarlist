<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MD8RMMY2TZ"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoiCarList | Professional Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; --whatsapp: #25D366; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(20, 20, 20, 0.98); padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .nav-link { cursor: pointer; color: #aaa; font-size: 11px; font-weight: 600; text-transform: uppercase; transition: color 0.3s; }
        .nav-link:hover { color: var(--gold); }
        .lang-toggle { color: var(--gold); font-size: 12px; font-weight: bold; border: 1px solid #333; padding: 2px 8px; border-radius: 4px; background: #111; min-width: 40px; }
        .hero-section { background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); padding: 35px 20px; text-align: center; border-bottom: 1px solid #222; }
        .area-button { background: #111; border: 1px solid var(--gold); transition: 0.2s; cursor: pointer; font-size: 12px; padding: 8px 4px; border-radius: 8px; color: #fff; }
        .area-button.active { background: var(--gold); color: #000; font-weight: bold; }
        .card { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1a; position: relative; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card-img { width: 100%; height: 220px; object-fit: contain; background: #000; border-bottom: 1px solid #111; }
        .gold-text { color: var(--gold); font-weight: 600; }
        .white-name { color: #ffffff; font-weight: 700; font-size: 15px; } 
        .status-mini { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .available { background: var(--whatsapp); color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .stop { background: #555; color: #fff; }
        .nation-tag { font-size: 9px; background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .hot-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #d4af37; font-size: 10px; padding: 3px 7px; border-radius: 20px; border: 1px solid #d4af37; font-weight: bold; display: flex; items-center; gap: 3px; z-index: 10; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        input, select, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 8px; border-radius: 6px; width: 100%; margin: 4px 0; font-size: 14px; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-preset { background: #222; font-size: 10px; padding: 5px 8px; border-radius: 4px; color: var(--gold); border: 1px solid #444; }
        .admin-item { background: #0a0a0a; border-bottom: 1px solid #222; padding: 10px 8px; display: flex; align-items: center; justify-content: space-between; }
        .count-pill { background: rgba(212, 175, 55, 0.1); color: var(--gold); font-size: 10px; padding: 2px 8px; border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .search-container { background: #111; border: 1px solid #222; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; margin-bottom: 15px; }
        .search-input { background: transparent; border: none; margin: 0; padding: 5px; font-size: 13px; width: 100%; }
        .hidden-badge { background: #440000; color: #ff6666; font-size: 8px; padding: 1px 4px; border-radius: 3px; margin-left: 5px; border: 1px solid #660000; }
        
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; text-transform: uppercase; margin-top: 10px; }
        #user-display { font-size: 11px; color: var(--gold); font-weight: bold; border-right: 1px solid #333; padding-right: 10px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>

    <script>
        const translations = {
            en: { home: "HOME", welcome: "Welcome to MoiCarList", subtitle: "Your Trusted Choice", available: "✨ Available Today", allNations: "All Nations", allCups: "All Cups", back: "← BACK", booking: "WHATSAPP BOOKING", hot: "HOT", total: "Total", ovn: "Overnight", searchPlaceholder: "Search name..." },
            cn: { home: "首页", welcome: "欢迎来到 MoiCarList", subtitle: "您值得信赖的选择", available: "✨ 今日在线", allNations: "所有国籍", allCups: "所有胸围", back: "← 返回", booking: "WHATSAPP 预约", hot: "火热", total: "总计", ovn: "包夜", searchPlaceholder: "搜索名字..." },
            bm: { home: "UTAMA", welcome: "Selamat Datang", subtitle: "Pilihan Dipercayai", available: "✨ Tersedia Hari Ini", allNations: "Semua Negara", allCups: "Semua Saiz", back: "← KEMBALI", booking: "TEMPAHAN WHATSAPP", hot: "HANGAT", total: "Jumlah", ovn: "Bermalam", searchPlaceholder: "Cari name..." }
        };
        const langLabels = { en: "EN", cn: "中", bm: "BM" };
        let currentLang = 'en';

        function updateTexts() {
            const t = translations[currentLang];
            document.getElementById('hero-title').innerText = t.welcome;
            document.getElementById('hero-desc').innerText = t.subtitle;
            document.getElementById('section-title').innerText = t.available;
            document.getElementById('btn-lang-toggle').innerText = langLabels[currentLang];
            document.getElementById('frontSearch').placeholder = t.searchPlaceholder;
            if (typeof window.renderEverything === "function") window.renderEverything();
        }

        function toggleLang() {
            const keys = Object.keys(translations);
            let idx = keys.indexOf(currentLang);
            currentLang = keys[(idx + 1) % keys.length];
            updateTexts();
        }
    </script>

    <nav>
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <div class="gold-text text-xl cursor-pointer font-bold" onclick="navigateTo('home')">MoiCarList</div>
            <div class="flex gap-3 items-center">
                <div id="user-info" class="hidden flex items-center gap-2">
                    <span id="user-display">User</span>
                    <a id="admin-link" onclick="navigateTo('adminPage')" class="nav-link hidden text-blue-400">ADMIN</a>
                    <a onclick="handleLogout()" class="nav-link text-[9px] text-red-500">OUT</a>
                </div>
                
                <div id="auth-buttons">
                    <a onclick="openAuthModal('login')" class="nav-link">Login</a>
                </div>
                
                <button id="btn-lang-toggle" onclick="toggleLang()" class="lang-toggle">EN</button>
            </div>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="hero-section">
            <h1 id="hero-title" class="text-2xl md:text-4xl font-bold text-[#d4af37] mb-2">Welcome to MoiCarList</h1>
            <p id="hero-desc" class="text-gray-400 text-xs md:text-sm">Your Trusted Choice</p>
        </div>
        <div class="max-w-6xl mx-auto px-4 py-6">
            <div id="areaButtons" class="grid grid-cols-3 md:grid-cols-5 gap-2 mb-6 text-center"></div>
            <div class="search-container mb-6">
                <span class="mr-2 opacity-50">🔍</span>
                <input type="text" id="frontSearch" class="search-input" placeholder="Search name..." oninput="window.handleFrontSearch(this.value)">
            </div>
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-3">
                <div class="flex items-center gap-3">
                    <h2 id="section-title" class="text-lg font-bold gold-text">✨ Available Today</h2>
                    <span id="area-count" class="count-pill">Total: 0</span>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <select id="nationFilter" onchange="window.selectNation(this.value)" class="bg-[#111] text-[#d4af37] border border-[#333] rounded px-2 py-1 text-[11px] outline-none flex-1"></select>
                    <select id="cupFilter" onchange="window.selectCup(this.value)" class="bg-[#111] text-[#d4af37] border border-[#333] rounded px-2 py-1 text-[11px] outline-none flex-1"></select>
                </div>
            </div>
            <div id="displayList" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        </div>
    </div>

    <div id="detailPage" class="page"><div class="max-w-2xl mx-auto p-4 pb-20"><div id="back-btn-text" class="mb-4 gold-text font-bold cursor-pointer" onclick="navigateTo('home')">← BACK</div><div id="detailContent"></div></div></div>

    <div id="adminPage" class="page bg-[#050505]">
        <div class="max-w-4xl mx-auto p-4">
            <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold gold-text">Admin Panel</h2><button onclick="openModal()" class="bg-[#d4af37] text-black px-4 py-1 rounded-full font-bold text-sm">+ Add New</button></div>
            <div class="search-container">
                <span class="mr-2 opacity-50">🔍</span>
                <input type="text" id="adminSearch" class="search-input" placeholder="Search..." oninput="window.handleAdminSearch(this.value)">
            </div>
            <div id="site-stats-container"></div>
            <div id="adminList" class="space-y-1"></div>
        </div>
    </div>

    <div id="girlModal" class="modal">
        <div class="bg-[#111] p-6 rounded-xl w-full max-w-sm max-h-[90vh] overflow-y-auto border border-[#222]">
            <h3 id="modalTitle" class="gold-text font-bold mb-4">Profile Info</h3>
            <input type="hidden" id="editId">
            <input type="text" id="gName" placeholder="Name">
            <div class="grid grid-cols-2 gap-2"><input type="number" id="gAge" placeholder="Age"><select id="gNation"><option>Thailand</option><option>Vietnam</option><option>Malaysia</option><option>Indonesia</option><option>Laos</option><option>China</option></select></div>
            <div class="grid grid-cols-2 gap-2"><input type="text" id="gCup" placeholder="Cup Size"><input type="text" id="gHeight" placeholder="Height"></div>
            <select id="gArea"><option>Alor Setar</option><option>Sungei Petani</option><option>Bukit Mertajam</option><option>Penang</option><option>Ipoh</option></select>
            <div class="grid grid-cols-2 gap-2">
                <select id="gStatus"><option value="available">Available</option><option value="busy">Busy</option><option value="stop">Stop</option></select>
                <select id="gIsHidden"><option value="false">Show</option><option value="true">Hide</option></select>
            </div>
            <div class="flex gap-2 my-2"><button onclick="setPrice(250)" class="btn-preset">Set RM250</button><button onclick="setPrice(270)" class="btn-preset">Set RM270</button></div>
            <div class="grid grid-cols-2 gap-2"><input type="number" id="gPrice1" placeholder="1 Shot"><input type="number" id="gPrice2" placeholder="2 Shot"></div>
            <div class="grid grid-cols-2 gap-2"><input type="number" id="gPrice3" placeholder="3 Shot"><input type="number" id="gPriceOvn" placeholder="Overnight"></div>
            <div class="mt-2 flex gap-2"><input type="text" id="gPhoto" placeholder="Photo URL" class="m-0 flex-1"><input type="file" id="fileInput" class="hidden" accept="image/*"><button onclick="document.getElementById('fileInput').click()" class="bg-gray-700 px-3 py-2 rounded text-[10px] text-white">UPLOAD</button></div>
            <div id="uploadStatus" class="text-[10px] text-gray-500 mb-2">Ready</div>
            <input type="text" id="gWhatsapp" placeholder="WhatsApp (60xxx)" value="601117917032">
            <textarea id="gDesc" placeholder="Bio" rows="2"></textarea>
            <button onclick="handleSave()" class="w-full bg-[#d4af37] text-black font-bold py-3 rounded-lg mt-4 text-sm uppercase">Save Profile</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-3 text-xs">CANCEL</button>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-[#222]">
            <h3 id="authTitle" class="gold-text font-bold mb-6 text-center">LOGIN</h3>
            <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-lg flex items-center justify-center gap-3 text-sm mb-4"><img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google Login</button>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPassword" placeholder="Password">
            <button onclick="processAuth()" class="btn-gold">Proceed</button>
            <p onclick="toggleAuthMode()" class="text-center text-[10px] text-gray-400 mt-4 cursor-pointer underline">Switch Login/Register</p>
            <button onclick="closeAuthModal()" class="w-full text-gray-700 mt-4 text-xs text-center">CANCEL</button>
        </div>
    </div>

    <div id="usernameModal" class="modal">
        <div class="bg-[#111] p-8 rounded-2xl w-full max-w-sm border border-gold text-center">
            <h3 class="gold-text font-bold mb-2">Set Username</h3>
            <input type="text" id="newUsername" placeholder="Unique Name">
            <p id="usernameError" class="text-red-500 text-[10px] mt-2 hidden"></p>
            <button onclick="saveUsername()" class="btn-gold mt-4">Confirm</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs", authDomain: "girlcarlist-db.firebaseapp.com", projectId: "girlcarlist-db", storageBucket: "girlcarlist-db.firebasestorage.app", messagingSenderId: "418933639880", appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const colRef = collection(db, "girls");
        
        let allData = [];
        let currentArea = 'Alor Setar';
        let currentNation = 'All';
        let currentCup = 'All';
        let frontSearchKeyword = "";
        let adminSearchKeyword = "";
        let authMode = 'login';
        
        // 🚨 重要：请把你自己账号的 UID 填在下面这个引号里
        // 你可以通过登录后，在 Console 里看 console.log("Your UID:", user.uid) 来获取
        const ADMIN_UID = "填入你的UID"; 

        window.openAuthModal = (m) => { authMode = m; document.getElementById('authModal').classList.add('active'); };
        window.closeAuthModal = () => document.getElementById('authModal').classList.remove('active');
        window.toggleAuthMode = () => { authMode = authMode==='login'?'register':'login'; openAuthModal(authMode); };
        window.loginWithGoogle = async () => { try { await signInWithPopup(auth, new GoogleAuthProvider()); closeAuthModal(); } catch(e){alert(e.message)} };
        window.processAuth = async () => {
            const e = document.getElementById('authEmail').value; const p = document.getElementById('authPassword').value;
            try { if(authMode==='register') await createUserWithEmailAndPassword(auth,e,p); else await signInWithEmailAndPassword(auth,e,p); closeAuthModal(); } catch(err){alert(err.message)}
        };
        window.handleLogout = () => { signOut(auth); navigateTo('home'); };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                console.log("Your UID:", user.uid); // 登录后按 F12 可以在 Console 看到自己的 UID
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                
                // 判断是否为管理员
                if(user.uid === ADMIN_UID) {
                    document.getElementById('admin-link').classList.remove('hidden');
                } else {
                    document.getElementById('admin-link').classList.add('hidden');
                }

                const uDoc = await getDoc(doc(db, "users", user.uid));
                if(uDoc.exists() && uDoc.data().username) {
                    document.getElementById('user-display').innerText = uDoc.data().username;
                } else { document.getElementById('usernameModal').classList.add('active'); }
            } else {
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('admin-link').classList.add('hidden');
            }
        });

        window.saveUsername = async () => {
            const name = document.getElementById('newUsername').value.trim();
            if(!name) return;
            const check = await getDoc(doc(db, "usernames", name.toLowerCase()));
            if(check.exists()){ alert("Taken!"); return; }
            await setDoc(doc(db, "usernames", name.toLowerCase()), {uid: auth.currentUser.uid});
            await setDoc(doc(db, "users", auth.currentUser.uid), {username: name}, {merge:true});
            document.getElementById('user-display').innerText = name;
            document.getElementById('usernameModal').classList.remove('active');
        };

        // --- 核心业务逻辑 (你的原版) ---
        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ 
                id: d.id, ...d.data(), 
                clicks: d.data().clicks || 0,
                isHidden: d.data().isHidden === "true" || d.data().isHidden === true
            })).sort((a, b) => a.name.localeCompare(b.name)); 
            window.renderEverything();
        });

        window.renderEverything = () => {
            const areas = ['Alor Setar', 'Sungei Petani', 'Bukit Mertajam', 'Penang', 'Ipoh'];
            document.getElementById('areaButtons').innerHTML = areas.map(a => `<div class="area-button ${currentArea === a ? 'active' : ''}" onclick="window.selectArea('${a}')">${a}</div>`).join('');
            
            let filtered = allData.filter(g => g.area === currentArea);
            let frontList = filtered.filter(g => !g.isHidden);
            if(currentNation !== 'All') frontList = frontList.filter(g => g.nation === currentNation);
            if(currentCup !== 'All') frontList = frontList.filter(g => g.cup === currentCup);
            if(frontSearchKeyword) frontList = frontList.filter(g => g.name.toLowerCase().includes(frontSearchKeyword.toLowerCase()));
            
            document.getElementById('area-count').innerText = `Total: ${frontList.length}`;
            renderMain([...frontList].sort((a, b) => b.clicks - a.clicks));
            renderAdmin(allData);
        };

        window.selectArea = (a) => { currentArea = a; window.renderEverything(); };
        window.handleFrontSearch = (v) => { frontSearchKeyword = v; window.renderEverything(); };
        window.handleAdminSearch = (v) => { adminSearchKeyword = v; window.renderEverything(); };

        function renderMain(data) {
            document.getElementById('displayList').innerHTML = data.map((g, index) => `
                <div class="card" onclick="window.showDetail('${g.id}')">
                    ${index < 3 && g.clicks > 0 ? `<div class="hot-badge">🔥 HOT #${index+1}</div>` : ''}
                    <img src="${g.photo}" class="card-img">
                    <div class="p-2">
                        <div class="flex justify-between items-center mb-1"><span class="white-name">${g.name}</span><span class="status-mini ${g.status}">${g.status}</span></div>
                        <div class="text-[10px] opacity-80">${g.age}Y | ${g.cup} | ${g.height}</div>
                    </div>
                </div>`).join('');
        }

        window.showDetail = async (id) => {
            const g = allData.find(x => x.id === id);
            await updateDoc(doc(db, "girls", id), { clicks: increment(1) });
            navigateTo('detailPage');
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-xl mb-4">
                <h1 class="text-2xl font-bold">${g.name}</h1>
                <p class="gold-text mb-4">${g.age}Y | ${g.cup} | ${g.nation}</p>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <div class="bg-[#111] p-3 rounded">1S: RM${g.p1}</div>
                    <div class="bg-[#111] p-3 rounded">2S: RM${g.p2}</div>
                    <div class="bg-[#111] p-3 rounded">3S: RM${g.p3}</div>
                    <div class="bg-[#1a1100] p-3 rounded border border-gold">OVN: RM${g.povn}</div>
                </div>
                <a href="https://wa.me/${g.whatsapp}" target="_blank" class="block w-full bg-[#25D366] text-center py-3 rounded-xl font-bold">WHATSAPP BOOKING</a>
            `;
        };

        window.handleSave = async () => {
            const id = document.getElementById('editId').value;
            const data = { 
                name: document.getElementById('gName').value, age: document.getElementById('gAge').value, 
                nation: document.getElementById('gNation').value, cup: document.getElementById('gCup').value, 
                height: document.getElementById('gHeight').value, p1: document.getElementById('gPrice1').value, 
                p2: document.getElementById('gPrice2').value, p3: document.getElementById('gPrice3').value, 
                povn: document.getElementById('gPriceOvn').value, area: document.getElementById('gArea').value, 
                status: document.getElementById('gStatus').value, photo: document.getElementById('gPhoto').value, 
                whatsapp: document.getElementById('gWhatsapp').value, desc: document.getElementById('gDesc').value,
                isHidden: document.getElementById('gIsHidden').value === "true"
            };
            if(id) await updateDoc(doc(db, "girls", id), data); else { data.clicks = 0; await addDoc(colRef, data); }
            closeModal();
        };

        window.handleDelete = async id => { if(confirm('Delete?')) await deleteDoc(doc(db, "girls", id)); };
        window.handleEdit = (id) => {
            const g = allData.find(x => x.id === id); openModal(true);
            document.getElementById('editId').value = g.id; document.getElementById('gName').value = g.name; 
            document.getElementById('gAge').value = g.age; document.getElementById('gNation').value = g.nation; 
            document.getElementById('gCup').value = g.cup; document.getElementById('gHeight').value = g.height; 
            document.getElementById('gPrice1').value = g.p1; document.getElementById('gPrice2').value = g.p2; 
            document.getElementById('gPrice3').value = g.p3; document.getElementById('gPriceOvn').value = g.povn;
            document.getElementById('gArea').value = g.area; document.getElementById('gStatus').value = g.status; 
            document.getElementById('gIsHidden').value = g.isHidden ? "true" : "false";
            document.getElementById('gPhoto').value = g.photo; document.getElementById('gWhatsapp').value = g.whatsapp; 
            document.getElementById('gDesc').value = g.desc;
        };

        function renderAdmin(data) {
            let filtered = data;
            if(adminSearchKeyword) filtered = data.filter(g => g.name.toLowerCase().includes(adminSearchKeyword.toLowerCase()));
            document.getElementById('adminList').innerHTML = filtered.map(g => `
                <div class="admin-item">
                    <div class="flex items-center gap-3">
                        <img src="${g.photo}" class="w-8 h-8 rounded object-cover">
                        <div class="text-xs"><b>${g.name}</b> ${g.isHidden ? ' (HIDDEN)' : ''}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.handleEdit('${g.id}')" class="text-blue-400 text-[10px]">EDIT</button>
                        <button onclick="window.handleDelete('${g.id}')" class="text-red-500 text-[10px]">DEL</button>
                    </div>
                </div>`).join('');
        }

        window.setPrice = (b) => {
            document.getElementById('gPrice1').value = b; document.getElementById('gPrice2').value = b*2;
            document.getElementById('gPrice3').value = b*3; document.getElementById('gPriceOvn').value = b===250?800:900;
        };

        updateTexts();
    </script>

    <script>
        function navigateTo(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); window.scrollTo(0,0);
        }
        function openModal(isEdit = false) { document.getElementById('girlModal').classList.add('active'); if(!isEdit) document.getElementById('editId').value=""; }
        function closeModal() { document.getElementById('girlModal').classList.remove('active'); }
        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }
    </script>
</body>
</html>
