<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GirlCarList | Cloud Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #d4af37; }
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; margin:0; }
        nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100; border-bottom:1px solid #333; }
        .area-pill { background: #1a1a1b; border: 1px solid #333; padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; white-space: nowrap; }
        .area-pill:hover { background: var(--gold); color: #000; }
        .card { background: #111; border-radius: 20px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .available { background: #30d158; color: #fff; }
        .busy { background: #ff453a; color: #fff; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 600; padding: 12px; border-radius: 12px; display: block; text-align: center; cursor: pointer; border:none; width:100%; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input, select, textarea { background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin: 8px 0; }
    </style>
</head>
<body>

    <nav class="h-14 flex items-center justify-between px-6">
        <div class="text-[#d4af37] font-bold text-xl cursor-pointer" onclick="navigateTo('home')">GirlCarList</div>
        <div class="flex gap-4 text-sm text-gray-400">
            <span onclick="navigateTo('home')" class="cursor-pointer">Home</span>
            <span onclick="showAdmin()" class="cursor-pointer">Admin</span>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="py-12 text-center px-4">
            <h1 class="text-4xl font-extrabold mb-4">Welcome to <span class="text-[#d4af37]">GirlCarList</span></h1>
            <div class="flex flex-wrap justify-center gap-2 mt-8 max-w-4xl mx-auto" id="areaContainer">
                </div>
        </div>
        <div class="max-w-6xl mx-auto px-6 pb-20">
            <h2 id="listTitle" class="text-2xl font-bold mb-8 text-[#d4af37]">Available Today</h2>
            <div id="displayList" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div class="max-w-4xl mx-auto p-6">
            <div class="mb-6 text-[#d4af37] font-bold cursor-pointer" onclick="navigateTo('home')">← Back</div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="max-w-4xl mx-auto p-6">
            <div class="flex justify-between mb-8">
                <h2 class="text-2xl font-bold">Admin Dashboard</h2>
                <button onclick="openModal()" class="bg-[#d4af37] text-black px-4 py-1 rounded-full font-bold">+ Add Girl</button>
            </div>
            <div id="adminList" class="space-y-4"></div>
        </div>
    </div>

    <div id="girlModal" class="modal">
        <div class="bg-[#1c1c1e] p-6 rounded-2xl w-full max-w-md">
            <h3 class="text-[#d4af37] font-bold mb-4">Add Girl Profile</h3>
            <input type="text" id="gName" placeholder="Name">
            <input type="number" id="gAge" placeholder="Age">
            <input type="number" id="gPrice" placeholder="Price (RM)">
            <select id="gArea">
                <option>Alor Setar</option><option>Sungei Petani</option><option>Penang</option><option>Bukit Mertajam</option><option>Ipoh</option>
            </select>
            <select id="gStatus">
                <option value="available">Available</option><option value="busy">Busy</option>
            </select>
            <input type="text" id="gPhoto" placeholder="Photo URL (Direct Link)">
            <input type="text" id="gWhatsapp" placeholder="WhatsApp (e.g. 60123456789)">
            <textarea id="gDesc" placeholder="Bio/Description"></textarea>
            <button onclick="handleSave()" class="btn-gold mt-4">Save to Cloud</button>
            <button onclick="closeModal()" class="w-full text-gray-500 mt-4 text-sm">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCK8dhWPA2pd04gzVxmkOgQuMpFfFPyXxs",
            authDomain: "girlcarlist-db.firebaseapp.com",
            projectId: "girlcarlist-db",
            storageBucket: "girlcarlist-db.firebasestorage.app",
            messagingSenderId: "418933639880",
            appId: "1:418933639880:web:a993e1c3e71f2e8d18f3fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "girls");

        let allData = [];

        // 实时获取云端数据
        onSnapshot(colRef, (snapshot) => {
            allData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderMain(allData);
            renderAdmin(allData);
            renderAreaButtons();
        });

        // 保存到云端
        window.handleSave = async function() {
            const btn = document.querySelector('.btn-gold');
            btn.innerText = "Saving...";
            const data = {
                name: document.getElementById('gName').value,
                age: document.getElementById('gAge').value,
                price: document.getElementById('gPrice').value,
                area: document.getElementById('gArea').value,
                status: document.getElementById('gStatus').value,
                photo: document.getElementById('gPhoto').value,
                whatsapp: document.getElementById('gWhatsapp').value,
                desc: document.getElementById('gDesc').value,
                time: Date.now()
            };
            await addDoc(colRef, data);
            btn.innerText = "Save to Cloud";
            closeModal();
        };

        window.handleDelete = async function(id) {
            if(confirm('Delete this?')) await deleteDoc(doc(db, "girls", id));
        };

        // 渲染主列表
        window.renderMain = function(data, title = "Available Today") {
            document.getElementById('listTitle').innerText = title;
            const container = document.getElementById('displayList');
            container.innerHTML = data.map(g => `
                <div class="card" onclick="showDetail('${g.id}')">
                    <img src="${g.photo}" class="w-full h-72 object-cover">
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-bold">${g.name}</span>
                            <span class="status-badge ${g.status}">${g.status}</span>
                        </div>
                        <div class="text-[#d4af37] font-bold">RM ${g.price}</div>
                    </div>
                </div>
            `).join('') || '<p class="text-gray-500">No data available.</p>';
        };

        window.showDetail = function(id) {
            const g = allData.find(x => x.id === id);
            navigateTo('detailPage');
            document.getElementById('detailContent').innerHTML = `
                <img src="${g.photo}" class="w-full rounded-2xl mb-6 shadow-2xl">
                <h1 class="text-3xl font-bold">${g.name}, ${g.age}</h1>
                <div class="text-[#d4af37] text-2xl font-bold my-4">RM ${g.price}</div>
                <div class="bg-[#111] p-4 rounded-xl mb-8 border border-[#222]">
                    <p class="text-gray-400">${g.desc}</p>
                </div>
                <a href="https://wa.me/${g.whatsapp}" class="btn-gold">WhatsApp Booking Now</a>
            `;
        };

        window.renderAdmin = function(data) {
            document.getElementById('adminList').innerHTML = data.map(g => `
                <div class="flex items-center justify-between bg-[#111] p-4 rounded-xl border border-[#222]">
                    <div class="flex items-center gap-4">
                        <img src="${g.photo}" class="w-12 h-12 rounded-full object-cover">
                        <div><div class="font-bold">${g.name}</div><div class="text-xs text-gray-500">${g.area}</div></div>
                    </div>
                    <button onclick="handleDelete('${g.id}')" class="text-red-500 font-bold">Delete</button>
                </div>
            `).join('');
        };
        
        window.renderAreaButtons = function() {
            const areas = ['Alor Setar', 'Sungei Petani', 'Penang', 'Bukit Mertajam', 'Ipoh'];
            document.getElementById('areaContainer').innerHTML = areas.map(a => `
                <div class="area-pill" onclick="filterArea('${a}')">${a}</div>
            `).join('');
        };

        window.filterArea = function(area) {
            const filtered = allData.filter(g => g.area === area);
            renderMain(filtered, `Location: ${area}`);
        };
    </script>

    <script>
        function navigateTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
        function showAdmin() {
            if(prompt("Password") === "admin123") navigateTo('adminPage');
        }
        function openModal() { document.getElementById('girlModal').classList.add('active'); }
        function closeModal() { document.getElementById('girlModal').classList.remove('active'); }
    </script>
</body>
</html>
